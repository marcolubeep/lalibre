<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Libre &mdash; Your Bag</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Montserrat:wght@200;300;400&display=swap&font-display=swap" rel="stylesheet">
 
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            background: #ffffff;
            color: #1a1a1a;
            -webkit-font-smoothing: antialiased;
        }
 
        .sticky-nav-wrapper {
            position: fixed;
            top: 0; left: 0;
            width: 100%;
            z-index: 1000;
            background: #fff;
            box-shadow: 0 1px 10px rgba(0,0,0,0.03);
        }
 
        .cart-page-wrapper {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
            padding-top: 150px;
        }
 
        .cart-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2rem;
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 2rem;
            border-bottom: 1px solid #f0f0f0;
            padding-bottom: 1rem;
        }
 
        /* Empty */
        .empty-msg {
            text-align: center;
            padding: 4rem 2rem;
            color: #999;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }
        .btn-continue {
            display: inline-block;
            margin-top: 1.5rem;
            padding: 0.8rem 2rem;
            border: 1px solid #1a1a1a;
            color: #1a1a1a;
            text-decoration: none;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 2px;
            font-family: 'Montserrat', sans-serif;
            transition: all 0.25s;
        }
        .btn-continue:hover { background: #1a1a1a; color: #fff; }
 
        /* Cart table */
        .cart-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 2rem;
        }
        .cart-table th {
            text-align: left;
            padding: 0.75rem 0.5rem;
            border-bottom: 1px solid #f0f0f0;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #aaa;
            font-weight: 300;
        }
        .cart-table td {
            padding: 1.25rem 0.5rem;
            border-bottom: 1px solid #f7f7f7;
            vertical-align: middle;
        }
        .item-img {
            width: 56px;
            height: 75px;
            object-fit: cover;
            background: #f0ede8;
            flex-shrink: 0;
        }
        .item-details { display: flex; align-items: center; gap: 1rem; }
        .item-name { font-size: 0.8rem; font-weight: 300; }
        .item-price { font-size: 0.75rem; color: #888; margin-top: 0.25rem; }
        .remove-btn {
            background: none;
            border: none;
            color: #aaa;
            cursor: pointer;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 0;
            margin-top: 0.4rem;
            display: block;
            font-family: 'Montserrat', sans-serif;
            transition: color 0.2s;
        }
        .remove-btn:hover { color: #c0392b; }
 
        /* Quantity controls */
        .qty-control {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        .qty-btn {
            background: none;
            border: 1px solid #ddd;
            width: 26px;
            height: 26px;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: border-color 0.2s;
            font-family: 'Montserrat', sans-serif;
        }
        .qty-btn:hover { border-color: #1a1a1a; }
        .qty-value { font-size: 0.8rem; min-width: 20px; text-align: center; }
 
        /* Summary */
        .summary-box {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 1rem;
            border-top: 1px solid #1a1a1a;
            padding-top: 1.5rem;
        }
        .subtotal-row {
            display: flex;
            gap: 3rem;
            font-size: 1rem;
            font-weight: 300;
            letter-spacing: 0.5px;
        }
        .btn-checkout {
            padding: 1rem 0;
            background: #1a1a1a;
            color: #fff;
            border: none;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 0.75rem;
            cursor: pointer;
            width: 100%;
            max-width: 350px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 300;
            transition: background 0.3s;
        }
        .btn-checkout:hover { background: #333; }
 
        @media (max-width: 600px) {
            .cart-page-wrapper { padding: 1rem; padding-top: 130px; }
            .cart-table th:nth-child(3),
            .cart-table td:nth-child(3) { display: none; }
            .btn-checkout { max-width: 100%; }
        }
    </style>
</head>
<body>
 
    <div class="sticky-nav-wrapper">
        <div id="dynamicBannerContainer"></div>
        <div id="dynamicNavContainer"></div>
    </div>
 
    <div class="cart-page-wrapper" id="cartPageWrapper">
 
        <h1 class="cart-title">Your Bag</h1>
 
        <div id="emptyView" class="empty-msg" style="display:none;">
            <p>Your bag is currently empty.</p>
            <a href="index.html" class="btn-continue">Continue Shopping</a>
        </div>
 
        <div id="cartView" style="display:none;">
            <table class="cart-table">
                <thead>
                    <tr>
                        <th>Product</th>
                        <th>Quantity</th>
                        <th>Total</th>
                    </tr>
                </thead>
                <tbody id="cartItemsList"></tbody>
            </table>
 
            <div class="summary-box">
                <div class="subtotal-row">
                    <span>Subtotal</span>
                    <span id="subtotalPrice">€0.00</span>
                </div>
                <button class="btn-checkout" onclick="alert('Proceeding to secure checkout…')">Proceed to Checkout</button>
            </div>
        </div>
 
    </div>
 
    <script src="products.js?v=3.5"></script>
    <script src="banner.js?v=3.5"></script>
    <script src="navbar.js?v=3.5"></script>
 
    <script>
        // Adjust top padding to actual nav height
        function adjustTopPadding() {
            const nav = document.querySelector('.sticky-nav-wrapper');
            const wrapper = document.getElementById('cartPageWrapper');
            if (nav && wrapper) wrapper.style.paddingTop = (nav.offsetHeight + 24) + 'px';
        }
        window.addEventListener('load', adjustTopPadding);
        window.addEventListener('resize', adjustTopPadding);
 
        function parsePrice(priceStr) {
            if (!priceStr) return 0;
            const num = parseFloat(priceStr.replace(/[^0-9,.]/g, '').replace(',', '.'));
            return isNaN(num) ? 0 : num;
        }
 
        function renderCart() {
            let cart = [];
            try {
                cart = JSON.parse(localStorage.getItem('laLibreCart') || '[]');
            } catch(e) {}
 
            const totalQty = cart.reduce((s, i) => s + (i.qty || 1), 0);
            const emptyView = document.getElementById('emptyView');
            const cartView = document.getElementById('cartView');
            const listEl = document.getElementById('cartItemsList');
            const subtotalEl = document.getElementById('subtotalPrice');
 
            if (totalQty === 0) {
                emptyView.style.display = 'block';
                cartView.style.display = 'none';
                return;
            }
 
            emptyView.style.display = 'none';
            cartView.style.display = 'block';
 
            let subtotal = 0;
 
            listEl.innerHTML = cart.map((item, idx) => {
                const itemPrice = parsePrice(item.price);
                const lineTotal = itemPrice * (item.qty || 1);
                subtotal += lineTotal;
                return `
                    <tr>
                        <td>
                            <div class="item-details">
                                <img class="item-img" src="${item.image || ''}" alt="${item.title}" onerror="this.style.background='#f0ede8';this.style.display='block';">
                                <div>
                                    <div class="item-name">${item.title}</div>
                                    <div class="item-price">${item.price}</div>
                                    <button class="remove-btn" onclick="removeItem(${idx})">Remove</button>
                                </div>
                            </div>
                        </td>
                        <td>
                            <div class="qty-control">
                                <button class="qty-btn" onclick="changeQty(${idx}, -1)" aria-label="Decrease quantity">−</button>
                                <span class="qty-value">${item.qty || 1}</span>
                                <button class="qty-btn" onclick="changeQty(${idx}, 1)" aria-label="Increase quantity">+</button>
                            </div>
                        </td>
                        <td style="font-size:0.8rem; font-weight:300;">€${lineTotal.toFixed(2)}</td>
                    </tr>
                `;
            }).join('');
 
            subtotalEl.textContent = `€${subtotal.toFixed(2)}`;
 
            // Keep legacy key in sync
            localStorage.setItem('cartItemCount', totalQty);
        }
 
        function removeItem(idx) {
            let cart = JSON.parse(localStorage.getItem('laLibreCart') || '[]');
            cart.splice(idx, 1);
            localStorage.setItem('laLibreCart', JSON.stringify(cart));
            renderCart();
        }
 
        function changeQty(idx, delta) {
            let cart = JSON.parse(localStorage.getItem('laLibreCart') || '[]');
            if (!cart[idx]) return;
            cart[idx].qty = Math.max(1, (cart[idx].qty || 1) + delta);
            localStorage.setItem('laLibreCart', JSON.stringify(cart));
            renderCart();
        }
 
        document.addEventListener('DOMContentLoaded', renderCart);
    </script>
 
    <script src="footer.js?v=3.5"></script>
</body>
</html>
