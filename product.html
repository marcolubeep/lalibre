<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>La Libre Studio &mdash; Product Details</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">
    <style>
        /* [STILI MANTENUTI INALTERATI - AGGIUNGI QUI QUELLI CHE AVEVI GIA] */
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; font-family: 'Montserrat', sans-serif; background-color: #ffffff; color: #1a1a1a; }
        .sticky-nav-wrapper { position: fixed; top: 0; width: 100%; z-index: 1000; background-color: #ffffff; box-shadow: 0 1px 10px rgba(0,0,0,0.03); }
        .product-page-wrapper { max-width: 1200px; margin: 0 auto; padding: 2rem; padding-top: 140px; }
        .product-detail-container { display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 4rem; align-items: start; }
        .product-gallery { width: 100%; aspect-ratio: 3 / 4; background-color: #f7f5f2; overflow: hidden; }
        .product-gallery img { width: 100%; height: 100%; object-fit: cover; }
        
        /* Modifica specifica per nascondere se necessario */
        .size-selector { margin-bottom: 1.5rem; display: none; } /* Nascosto di default */
        .size-selector.active { display: block; }

        .size-label { font-size: 0.65rem; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 0.8rem; color: #8a7a6a; }
        .size-options { display: flex; gap: 0.8rem; }
        .size-btn { min-width: 55px; padding: 0.6rem 1rem; border: 1px solid #e2dbd2; background: #fff; cursor: pointer; transition: all 0.2s; }
        .size-btn.selected { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
        .add-to-bag-btn { width: 100%; background-color: #1a1a1a; color: #ffffff; border: none; padding: 1.2rem; text-transform: uppercase; letter-spacing: 3px; cursor: pointer; }
        .add-to-bag-btn.added { background-color: #4a7c59; }
    </style>
</head>
<body>

    <div class="sticky-nav-wrapper">
        <div id="dynamicNavContainer"></div>
    </div>

    <div class="product-page-wrapper" id="productPageWrapper">
        <main class="product-detail-container" id="productContentContainer">
            <div class="product-gallery" id="productGalleryBox">
                <img id="productImage" src="" alt="Product Image" style="display:none;">
            </div>

            <div class="product-meta-panel">
                <h1 id="productTitle" class="main-product-title">Loading...</h1>
                <div id="productPrice" class="main-product-price"></div>
                
                <div class="size-selector" id="sizeSelector">
                    <div class="size-label">SELECT SIZE</div>
                    <div class="size-options" id="sizeOptions">
                        <button type="button" class="size-btn" data-size="S">S</button>
                        <button type="button" class="size-btn" data-size="M">M</button>
                        <button type="button" class="size-btn" data-size="L">L</button>
                    </div>
                </div>

                <button class="add-to-bag-btn" id="addToBagBtn">Add To Bag</button>
            </div>
        </main>
    </div>

    <script src="products.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const urlParams = new URLSearchParams(window.location.search);
            const productId = urlParams.get('id');
            const product = window.productsMaster?.find(p => p.id === productId);
            
            if (!product) return;

            // 1. Logica Taglie: mostra se il prodotto è abbigliamento o lingerie
            const needsSize = ['dresses', 'lingerie'].includes(product.category) || 
                              (product.categories && product.categories.some(c => ['dresses', 'lingerie'].includes(c)));

            const sizeSelector = document.getElementById('sizeSelector');
            let selectedSize = null;

            if (needsSize) {
                sizeSelector.classList.add('active');
                document.querySelectorAll('.size-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('selected'));
                        btn.classList.add('selected');
                        selectedSize = btn.getAttribute('data-size');
                    });
                });
            }

            // 2. Logica Aggiunta al Carrello
            document.getElementById('addToBagBtn').addEventListener('click', () => {
                if (needsSize && !selectedSize) {
                    alert('Please select a size');
                    return;
                }
                
                let cart = JSON.parse(localStorage.getItem('laLibreCart') || '[]');
                const cartItem = {
                    id: selectedSize ? `${product.id}_${selectedSize}` : product.id,
                    title: product.title,
                    size: selectedSize,
                    price: product.price
                };
                cart.push(cartItem);
                localStorage.setItem('laLibreCart', JSON.stringify(cart));
                alert('Added to bag!');
            });

            // Popola campi base
            document.getElementById('productTitle').textContent = product.title;
            document.getElementById('productPrice').textContent = product.price;
            document.getElementById('productImage').src = product.image;
            document.getElementById('productImage').style.display = 'block';
        });
    </script>
</body>
</html>
