<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Libre | Product Detail</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #1a1a1a;
            --accent-color: #707070;
            --light-gray: #f9f9f9;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); line-height: 1.6; }
        
        header {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            padding: 1.5rem 4%;
            border-bottom: 1px solid #eee;
            position: sticky;
            top: 0;
            background: white;
            z-index: 100;
        }
        
        .nav-left { display: flex; gap: 1.5rem; }
        .nav-left a { text-decoration: none; color: var(--text-color); font-size: 0.9rem; font-weight: 400; transition: color 0.2s; }
        .nav-left a:hover { color: var(--accent-color); }
        
        .logo { 
            font-family: serif; 
            font-size: 1.6rem; 
            letter-spacing: 0.3rem; 
            text-transform: uppercase; 
            font-weight: 400; 
            cursor: pointer;
            text-align: center;
        }
        
        .nav-right { 
            display: flex; 
            justify-content: flex-end; 
            align-items: center; 
            gap: 1.8rem; 
        }
        
        .social-icons { 
            display: flex; 
            gap: 1.2rem; 
            color: var(--text-color); 
            align-items: center; 
        }
        
        .social-icons a {
            color: inherit; 
            display: inline-flex; 
            align-items: center;
            text-decoration: none;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }
        
        .social-icons i, .social-icons svg { 
            display: inline-block;
            width: 18px; 
            height: 18px; 
        }
        
        .lang-select {
            font-size: 0.8rem;
            border: none;
            background: transparent;
            cursor: pointer;
            outline: none;
            letter-spacing: 1px;
            font-weight: 400;
            color: var(--text-color);
            width: auto;
            padding-right: 5px;
            text-transform: uppercase;
        }

        .cart-icon-wrapper { 
            position: relative; 
            display: flex; 
            align-items: center; 
            text-decoration: none; 
            color: inherit;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }
        .cart-badge {
            position: absolute; top: -8px; right: -12px;
            background: var(--text-color); color: white;
            font-size: 0.65rem; padding: 2px 5px; border-radius: 50%;
        }

        .product-container {
            max-width: 1100px;
            margin: 4rem auto;
            padding: 0 2rem;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
        }

        .product-image-side {
            height: 600px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-size: cover;
            background-position: center;
            font-weight: 500;
        }

        .product-details-side {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .product-title { font-family: serif; font-size: 2.2rem; font-weight: 400; margin-bottom: 0.5rem; }
        .product-tagline { font-size: 1rem; color: var(--accent-color); margin-bottom: 1.5rem; }
        .product-price { font-size: 1.4rem; font-weight: 500; margin-bottom: 2rem; }
        
        .size-selector { margin-bottom: 2rem; }
        .size-selector p { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.5rem; color: var(--accent-color); }
        .size-options { display: flex; gap: 0.5rem; }
        .size-btn { padding: 0.5rem 1rem; border: 1px solid #ccc; background: white; cursor: pointer; font-size: 0.9rem; transition: all 0.2s; }
        .size-btn:hover, .size-btn.active { border-color: var(--text-color); background: var(--text-color); color: white; }

        .add-to-cart-btn {
            width: 100%;
            padding: 1rem;
            background: var(--text-color);
            color: white;
            border: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .add-to-cart-btn:hover { opacity: 0.9; }

        .error-message { grid-column: 1/-1; text-align: center; padding: 4rem 0; }
        .error-message h2 { font-family: serif; margin-bottom: 1rem; }
        .error-message a { color: var(--text-color); }

        @media (max-width: 900px) {
            header { grid-template-columns: 1fr; gap: 1rem; text-align: center; }
            .nav-left, .nav-right { justify-content: center; }
            .logo { order: -1; }
            .product-container { grid-template-columns: 1fr; gap: 2rem; margin: 2rem auto; }
            .product-image-side { height: 450px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="nav-left">
            <a href="index.html">Home</a>
            <a href="index.html">Dresses</a>
            <a href="index.html">Lingeries</a>
            <a href="index.html">New Arrivals</a>
        </div>
        
        <div class="logo" onclick="window.location.href='index.html'">La Libre</div>
        
        <div class="nav-right">
            <div class="social-icons">
                <a href="https://www.instagram.com/lalibreofficial/" target="_blank" rel="noopener noreferrer">
                    <i data-lucide="instagram">IG</i>
                </a>
                <a href="#"><i data-lucide="facebook">FB</i></a>
                <a href="#"><i data-lucide="pinterest">PIN</i></a>
            </div>
            <select class="lang-select">
                <option>EN (UK)</option>
                <option>FR</option>
            </select>
            <a href="cart.html" class="cart-icon-wrapper">
                <i data-lucide="shopping-bag">BAG</i>
                <span class="cart-badge">0</span>
            </a>
        </div>
    </header>

    <main class="product-container" id="productContent">
        </main>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="products.js"></script>

    <script>
        function updateCartBadge() {
            const currentCount = localStorage.getItem('cartItemCount') || 0;
            const badge = document.querySelector('.cart-badge');
            if(badge) badge.innerText = currentCount;
        }

        function handleAddToCart() {
            let currentCount = parseInt(localStorage.getItem('cartItemCount') || 0);
            currentCount += 1;
            localStorage.setItem('cartItemCount', currentCount);
            updateCartBadge();
            alert("Item added to your slow-shopping bag.");
        }

        window.addEventListener('load', () => {
            if (typeof lucide !== 'undefined' && typeof lucide.createIcons === 'function') {
                lucide.createIcons();
            }
            
            updateCartBadge();

            const container = document.getElementById('productContent');
            const urlParams = new URLSearchParams(window.location.search);
            const productId = urlParams.get('id');

            if (!container) return;

            const product = typeof productsMaster !== 'undefined' 
                ? productsMaster.find(p => p.id === productId) 
                : null;

            if (!product || product.status !== 'active') {
                container.innerHTML = `
                    <div class="error-message">
                        <h2>Product Not Found</h2>
                        <p>The piece you are looking for is currently unavailable or archiving.</p>
                        <p style="margin-top: 1.5rem;"><a href="index.html">Return to the Collection</a></p>
                    </div>`;
                return;
            }

            const bgStyle = product.image ? `background-image: url('${product.image}');` : '';
            const textColor = product.fallbackColor === "#111111" || product.fallbackColor === "#2c2a29" ? "color: #fff;" : "";
            const placeholderText = !product.image ? `[ ${product.title} ]` : "";

            container.innerHTML = `
                <div class="product-image-side" style="${bgStyle} background-color: ${product.fallbackColor}; ${textColor}">
                    ${placeholderText}
                </div>
                <div class="product-details-side">
                    <h1 class="product-title">${product.title}</h1>
                    <p class="product-tagline">${product.tagline}</p>
                    <div class="product-price">${product.price}</div>
                    
                    <div class="size-selector">
                        <p>Select Size (Atemporal Fit)</p>
                        <div class="size-options">
                            <button class="size-btn active">S</button>
                            <button class="size-btn">M</button>
                            <button class="size-btn">L</button>
                        </div>
                    </div>

                    <button class="add-to-cart-btn" id="addToCartBtn">Add to Bag</button>
                </div>
            `;

            document.getElementById('addToCartBtn').addEventListener('click', handleAddToCart);
            
            const sizeBtns = document.querySelectorAll('.size-btn');
            sizeBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    sizeBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                });
            });
        });
    </script>
</body>
</html>
