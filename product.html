<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Libre Studio &mdash; Product Details</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
            background-color: #ffffff;
            color: #1a1a1a;
            -webkit-font-smoothing: antialiased;
        }

        /* 📌 NAVBAR ANCORATA IN CIMA */
        .sticky-nav-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            background-color: #ffffff;
            box-shadow: 0 1px 10px rgba(0, 0, 0, 0.02);
        }

        #dynamicNavContainer {
            width: 100%;
            margin: 0;
            padding: 0;
            display: block;
        }

        /* Struttura della pagina */
        .product-page-wrapper {
            margin-top: 120px; 
            max-width: 1200px;
            margin-left: auto;
            margin-right: auto;
            padding: 2rem;
            box-sizing: border-box;
        }

        .product-detail-container {
            display: grid;
            grid-template-columns: 1.1fr 0.9fr;
            gap: 4rem;
            align-items: start;
        }

        .product-gallery {
            width: 100%;
            aspect-ratio: 3 / 4;
            background-color: #f7f5f2;
            overflow: hidden;
            position: relative;
        }

        .product-gallery img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .product-meta-panel {
            padding-top: 1rem;
        }

        .product-breadcrumb {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #b3b3b3;
            margin-bottom: 1.5rem;
        }
        .product-breadcrumb a {
            color: #b3b3b3;
            text-decoration: none;
        }

        .main-product-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.4rem;
            font-weight: 300;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0 0 0.5rem 0;
            line-height: 1.1;
        }

        .main-product-price {
            font-size: 1.1rem;
            font-weight: 300;
            color: #707070;
            margin-bottom: 2rem;
        }

        .product-description-text {
            font-size: 0.8rem;
            color: #4a4a4a;
            line-height: 1.7;
            font-weight: 300;
            margin-bottom: 2.5rem;
        }

        .add-to-bag-btn {
            width: 100%;
            background-color: #1a1a1a;
            color: #ffffff;
            border: none;
            padding: 1.2rem;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 300;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .add-to-bag-btn:hover {
            background-color: #333333;
        }

        /* Schermata di errore se il prodotto non esiste */
        .error-message {
            grid-column: 1 / -1;
            text-align: center;
            padding: 4rem 2rem;
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.5rem;
            font-weight: 300;
            color: #707070;
        }

        @media (max-width: 900px) {
            .product-page-wrapper { margin-top: 90px; padding: 1rem; }
            .product-detail-container { grid-template-columns: 1fr; gap: 2rem; }
            .main-product-title { font-size: 2rem; }
        }
        
        @media (max-width: 600px) {
            .product-page-wrapper { margin-top: 140px; }
        }
    </style>
</head>
<body>

    <div class="sticky-nav-wrapper">
        <div id="dynamicNavContainer"></div>
    </div>

    <div class="product-page-wrapper">
        <main class="product-detail-container" id="productContentContainer">
            
            <div class="product-gallery" id="productGalleryBox">
                <img id="productImage" src="" alt="Product Image" style="display:none;">
            </div>

            <div class="product-meta-panel">
                <div class="product-breadcrumb">
                    <a href="index.html">Home</a> &mdash; <span id="productCategory">Collection</span>
                </div>
                
                <h1 id="productTitle" class="main-product-title">Loading...</h1>
                <div id="productPrice" class="main-product-price"></div>
                
                <p id="productDescription" class="product-description-text"></p>
                
                <button class="add-to-bag-btn" id="addToBagBtn">Add To Bag</button>
            </div>

        </main>
    </div>

    <script src="products.js"></script>
    <script src="navbar.js?v=3.4"></script>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const currentLang = localStorage.getItem('selectedLang') || 'en';
            
            // 1. Lettura dei parametri URL
            const urlParams = new URLSearchParams(window.location.search);
            const productIdStr = urlParams.get('id');
            const productId = parseInt(productIdStr, 10);

            // Traduzione del bottone d'acquisto
            const bagButtonTranslations = { en: "Add To Bag", es: "Añadir al Bolso", zh: "加入购物袋" };
            const btnBag = document.getElementById('addToBagBtn');
            if(btnBag) btnBag.textContent = bagButtonTranslations[currentLang] || bagButtonTranslations['en'];

            const container = document.getElementById('productContentContainer');

            // 2. Controllo di sicurezza: Il file products.js è caricato?
            if (typeof productsMaster === 'undefined') {
                container.innerHTML = `<div class="error-message">Database error: 'productsMaster' is missing. Check your products.js file.</div>`;
                return;
            }

            // 3. Controllo di sicurezza: L'ID nell'URL è valido?
            if (!productIdStr || isNaN(productId)) {
                container.innerHTML = `<div class="error-message">No valid product ID specified in the URL. (e.g., product.html?id=1)</div>`;
                return;
            }

            // 4. Ricerca del prodotto
            const product = productsMaster.find(p => p.id === productId);
            
            if (product) {
                // Estrazione traduzioni flessibile (evita errori se mancano dei campi)
                const translation = product.translations[currentLang] || product.translations['en'] || {};
                
                // Assegnazione dati con fallback intelligenti (se manca la descrizione usa la tagline)
                document.getElementById('productTitle').textContent = product.title || "Untitled Product";
                document.getElementById('productPrice').textContent = product.price || "";
                document.getElementById('productCategory').textContent = product.category || "Collection";
                document.getElementById('productDescription').textContent = translation.description || translation.tagline || "";
                
                // Caricamento immagine con colore di sfondo se l'immagine fallisce
                const imgEl = document.getElementById('productImage');
                const galleryBox = document.getElementById('productGalleryBox');
                
                if (product.fallbackColor) {
                    galleryBox.style.backgroundColor = product.fallbackColor;
                }

                if (imgEl && product.image) {
                    imgEl.src = product.image;
                    imgEl.style.display = 'block';
                    imgEl.onerror = function() {
                        this.style.display = 'none'; // Nasconde l'immagine rotta ma lascia il colore di sfondo
                    };
                }
            } else {
                // Se l'ID cercato non esiste nel database
                container.innerHTML = `<div class="error-message">Product with ID ${productId} could not be found in our collection.</div>`;
            }
        });
    </script>

    <script src="footer.js?v=3.4"></script>

</body>
</html>
