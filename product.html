<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Libre Studio &mdash; Product Details</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Montserrat:wght@200;300;400&display=swap&font-display=swap" rel="stylesheet">
 
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
            background-color: #ffffff;
            color: #1a1a1a;
            -webkit-font-smoothing: antialiased;
        }
 
        .sticky-nav-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            background-color: #ffffff;
            box-shadow: 0 1px 10px rgba(0,0,0,0.03);
        }
 
        #dynamicNavContainer { width: 100%; display: block; }
 
        /* Page wrapper — offset calculated via JS to match nav height */
        .product-page-wrapper {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
            padding-top: 140px; /* will be adjusted by JS */
        }
 
        .product-detail-container {
            display: grid;
            grid-template-columns: 1.1fr 0.9fr;
            gap: 4rem;
            align-items: start;
        }
 
        .product-gallery {
            width: 100%;
            aspect-ratio: 3 / 4;
            background-color: #f7f5f2;
            overflow: hidden;
            position: relative;
        }
        .product-gallery img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
 
        .product-meta-panel { padding-top: 1rem; }
 
        .product-breadcrumb {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #b3b3b3;
            margin-bottom: 1.5rem;
        }
        .product-breadcrumb a { color: #b3b3b3; text-decoration: none; }
 
        .main-product-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.4rem;
            font-weight: 300;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0 0 0.5rem;
            line-height: 1.1;
        }
        .main-product-price {
            font-size: 1.1rem;
            font-weight: 300;
            color: #707070;
            margin-bottom: 2rem;
        }
        .product-description-text {
            font-size: 0.8rem;
            color: #4a4a4a;
            line-height: 1.7;
            font-weight: 300;
            margin-bottom: 2.5rem;
        }
 
        /* Add to bag button */
        .add-to-bag-btn {
            width: 100%;
            background-color: #1a1a1a;
            color: #ffffff;
            border: none;
            padding: 1.2rem;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 300;
            cursor: pointer;
            transition: background-color 0.3s ease, opacity 0.3s;
        }
        .add-to-bag-btn:hover { background-color: #333333; }
        .add-to-bag-btn.added { background-color: #4a7c59; }
 
        /* View bag link shown after adding */
        .view-bag-link {
            display: none;
            text-align: center;
            margin-top: 1rem;
            font-size: 0.7rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #707070;
            text-decoration: none;
        }
        .view-bag-link:hover { color: #1a1a1a; }
 
        .error-message {
            grid-column: 1 / -1;
            text-align: center;
            padding: 4rem 2rem;
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.5rem;
            font-weight: 300;
            color: #707070;
        }
 
        /* ── Responsive ── */
        @media (max-width: 900px) {
            .product-page-wrapper { padding: 1.25rem; padding-top: 110px; }
            .product-detail-container { grid-template-columns: 1fr; gap: 2rem; }
            .main-product-title { font-size: 1.9rem; }
        }
 
        @media (max-width: 600px) {
            .product-page-wrapper { padding-top: 130px; }
            .main-product-title { font-size: 1.6rem; }
            .main-product-price { font-size: 1rem; }
        }
    </style>
</head>
<body>
 
    <div class="sticky-nav-wrapper">
        <div id="dynamicBannerContainer"></div>
        <div id="dynamicNavContainer"></div>
    </div>
 
    <div class="product-page-wrapper" id="productPageWrapper">
        <main class="product-detail-container" id="productContentContainer">
 
            <div class="product-gallery" id="productGalleryBox">
                <img id="productImage" src="" alt="Product Image" style="display:none;">
            </div>
 
            <div class="product-meta-panel">
                <div class="product-breadcrumb">
                    <a href="index.html">Home</a> &mdash; <span id="productCategory">Collection</span>
                </div>
 
                <h1 id="productTitle" class="main-product-title">Loading&hellip;</h1>
                <div id="productPrice" class="main-product-price"></div>
                <p id="productDescription" class="product-description-text"></p>
 
                <button class="add-to-bag-btn" id="addToBagBtn">Add To Bag</button>
                <a href="cart.html" class="view-bag-link" id="viewBagLink">View Bag &rarr;</a>
            </div>
 
        </main>
    </div>
 
    <script src="products.js?v=3.5"></script>
    <script src="banner.js?v=3.5"></script>
    <script src="navbar.js?v=3.5"></script>
 
    <script>
        // Adjust top padding to match actual nav height (handles banner variations)
        function adjustTopPadding() {
            const nav = document.querySelector('.sticky-nav-wrapper');
            const wrapper = document.getElementById('productPageWrapper');
            if (nav && wrapper) {
                wrapper.style.paddingTop = (nav.offsetHeight + 24) + 'px';
            }
        }
        window.addEventListener('load', adjustTopPadding);
        window.addEventListener('resize', adjustTopPadding);
 
        document.addEventListener("DOMContentLoaded", function() {
            const currentLang = localStorage.getItem('selectedLang') || 'en';
 
            const bagButtonTranslations = {
                en: "Add To Bag",
                es: "Añadir al Bolso",
                zh: "加入购物袋"
            };
            const addedTranslations = {
                en: "Added to Bag ✓",
                es: "Añadido ✓",
                zh: "已加入 ✓"
            };
 
            const urlParams = new URLSearchParams(window.location.search);
            const productId = urlParams.get('id');
            const container = document.getElementById('productContentContainer');
            const btnBag = document.getElementById('addToBagBtn');
            const viewBagLink = document.getElementById('viewBagLink');
 
            btnBag.textContent = bagButtonTranslations[currentLang] || bagButtonTranslations['en'];
 
            if (typeof productsMaster === 'undefined') {
                container.innerHTML = `<div class="error-message">Product database unavailable. Check products.js.</div>`;
                return;
            }
 
            if (!productId) {
                container.innerHTML = `<div class="error-message">No product specified. (e.g., product.html?id=amour-lace)</div>`;
                return;
            }
 
            const product = productsMaster.find(p => p.id === productId);
 
            if (product) {
                const translation = (product.translations && product.translations[currentLang])
                    || (product.translations && product.translations['en'])
                    || {};
 
                document.title = `La Libre — ${product.title}`;
                document.getElementById('productTitle').textContent = product.title || 'Untitled';
                document.getElementById('productPrice').textContent = product.price || '';
                document.getElementById('productCategory').textContent =
                    (Array.isArray(product.categories) && product.categories[0]) || 'Collection';
                document.getElementById('productDescription').textContent =
                    translation.description || translation.tagline || '';
 
                const imgEl = document.getElementById('productImage');
                const galleryBox = document.getElementById('productGalleryBox');
                if (product.fallbackColor) galleryBox.style.backgroundColor = product.fallbackColor;
                if (imgEl && product.image) {
                    imgEl.src = product.image;
                    imgEl.alt = product.title;
                    imgEl.style.display = 'block';
                    imgEl.onerror = function() { this.style.display = 'none'; };
                }
 
                // ── Add to bag logic ──
                btnBag.addEventListener('click', function() {
                    try {
                        let cart = JSON.parse(localStorage.getItem('laLibreCart') || '[]');
                        const existing = cart.find(i => i.id === product.id);
                        if (existing) {
                            existing.qty = (existing.qty || 1) + 1;
                        } else {
                            cart.push({
                                id: product.id,
                                title: product.title,
                                price: product.price,
                                image: product.image,
                                qty: 1
                            });
                        }
                        localStorage.setItem('laLibreCart', JSON.stringify(cart));
                        // Legacy count key for backward compat with cart.html
                        localStorage.setItem('cartItemCount', cart.reduce((s, i) => s + i.qty, 0));
                    } catch(e) {
                        console.warn('Cart write failed', e);
                    }
 
                    btnBag.textContent = addedTranslations[currentLang] || addedTranslations['en'];
                    btnBag.classList.add('added');
                    viewBagLink.style.display = 'block';
 
                    setTimeout(() => {
                        btnBag.textContent = bagButtonTranslations[currentLang] || bagButtonTranslations['en'];
                        btnBag.classList.remove('added');
                    }, 2500);
                });
 
            } else {
                container.innerHTML = `<div class="error-message">Product "${productId}" could not be found in our collection.</div>`;
            }
        });
    </script>
 
    <script src="footer.js?v=3.5"></script>
</body>
</html>
