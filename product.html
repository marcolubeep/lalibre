<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Libre Studio &mdash; Product Details</title>
    
    <!-- Importazione Font per coerenza di brand -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
            background-color: #ffffff;
            color: #1a1a1a;
            -webkit-font-smoothing: antialiased;
        }

        /* 📌 NAVBAR ANCORATA IN CIMA (Identica alla Homepage) */
        .sticky-nav-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            background-color: #ffffff;
            box-shadow: 0 1px 10px rgba(0, 0, 0, 0.02);
        }

        #dynamicNavContainer {
            width: 100%;
            margin: 0;
            padding: 0;
            display: block;
        }

        /* Compensazione per evitare che il prodotto finisca dietro la Navbar fissa */
        .product-page-wrapper {
            margin-top: 110px; /* Spazio protettivo per il distanziamento */
            max-width: 1200px;
            margin-left: auto;
            margin-right: auto;
            padding: 2rem;
            box-sizing: border-box;
        }

        /* Struttura Dettaglio Prodotto Layout Spaccato */
        .product-detail-container {
            display: grid;
            grid-template-columns: 1.1fr 0.9fr;
            gap: 4rem;
            align-items: start;
        }

        .product-gallery {
            width: 100%;
            aspect-ratio: 3 / 4;
            background-color: #f7f5f2;
            overflow: hidden;
        }

        .product-gallery img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Info Editoriali */
        .product-meta-panel {
            padding-top: 1rem;
        }

        .product-breadcrumb {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #b3b3b3;
            margin-bottom: 1.5rem;
        }
        .product-breadcrumb a {
            color: #b3b3b3;
            text-decoration: none;
        }

        .main-product-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.4rem;
            font-weight: 300;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0 0 0.5rem 0;
            line-height: 1.1;
        }

        .main-product-price {
            font-size: 1.1rem;
            font-weight: 300;
            color: #707070;
            margin-bottom: 2rem;
        }

        .product-description-text {
            font-size: 0.8rem;
            color: #4a4a4a;
            line-height: 1.7;
            font-weight: 300;
            margin-bottom: 2.5rem;
        }

        /* Bottone Add To Bag minimale */
        .add-to-bag-btn {
            width: 100%;
            background-color: #1a1a1a;
            color: #ffffff;
            border: none;
            padding: 1.2rem;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 300;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .add-to-bag-btn:hover {
            background-color: #333333;
        }

        /* Responsive */
        @media (max-width: 900px) {
            .product-page-wrapper { margin-top: 90px; padding: 1rem; }
            .product-detail-container { grid-template-columns: 1fr; gap: 2rem; }
            .main-product-title { font-size: 2rem; }
        }
        
        @media (max-width: 600px) {
            .product-page-wrapper { margin-top: 120px; }
        }
    </style>
</head>
<body>

    <!-- 📌 Navbar Sticky Identica all'Index (Senza banner.js) -->
    <div class="sticky-nav-wrapper">
        <div id="dynamicNavContainer"></div>
    </div>

    <!-- Contenuto della Pagina Prodotto -->
    <div class="product-page-wrapper">
        <main class="product-detail-container">
            
            <!-- Galleria Immagine -->
            <div class="product-gallery">
                <img id="productImage" src="" alt="Product Image" style="display:none;">
            </div>

            <!-- Info Dettaglio -->
            <div class="product-meta-panel">
                <div class="product-breadcrumb">
                    <a href="index.html">Home</a> &mdash; <span id="productCategory">Collection</span>
                </div>
                
                <h1 id="productTitle" class="main-product-title">&mdash;</h1>
                <div id="productPrice" class="main-product-price">&mdash;</div>
                
                <p id="productDescription" class="product-description-text">&mdash;</p>
                
                <button class="add-to-bag-btn" id="addToBagBtn">Add To Bag</button>
            </div>

        </main>
    </div>

    <!-- Script Caricati (banner.js rimosso anche qui per pulizia totale) -->
    <script src="products.js?v=3.3"></script>
    <script src="navbar.js?v=3.3"></script>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const currentLang = localStorage.getItem('selectedLang') || 'en';
            
            // Estrazione ID del prodotto dall'URL
            const urlParams = new URLSearchParams(window.location.search);
            const productId = parseInt(urlParams.get('id'));

            // Bottoni traduzioni veloci per l'azione d'acquisto
            const bagButtonTranslations = {
                en: "Add To Bag",
                es: "Añadir al Bolso",
                zh: "加入购物袋"
            };
            
            const btnBag = document.getElementById('addToBagBtn');
            if(btnBag) btnBag.textContent = bagButtonTranslations[currentLang] || bagButtonTranslations['en'];

            // Trova e renderizza il prodotto corretto dal master database
            if (typeof productsMaster !== 'undefined' && productId) {
                const product = productsMaster.find(p => p.id === productId);
                
                if (product) {
                    const translation = product.translations[currentLang] || product.translations['en'];
                    
                    // Injection dei dati dinamici
                    document.getElementById('productTitle').textContent = product.title;
                    document.getElementById('productPrice').textContent = product.price;
                    document.getElementById('productDescription').textContent = translation.description || translation.tagline;
                    document.getElementById('productCategory').textContent = product.category || "Collection";
                    
                    const imgEl = document.getElementById('productImage');
                    if (imgEl) {
                        imgEl.src = product.image;
                        imgEl.style.display = 'block';
                    }
                }
            }
        });
    </script>

    <script src="footer.js?v=3.3"></script>

</body>
</html>
