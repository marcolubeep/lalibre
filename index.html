<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Libre Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Montserrat:wght@200;300;400&display=swap&font-display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; font-family: 'Montserrat', sans-serif; background: #fff; color: #1a1a1a; -webkit-font-smoothing: antialiased; }
 
        .sticky-nav { position: fixed; top: 0; width: 100%; z-index: 1000; background: #fff; }
        .main-content { margin-top: 110px; }
 
        /* ── Hero ── */
        .hero { position: relative; height: 420px; display: flex; align-items: center; justify-content: center; background: #111; overflow: hidden; }
        .hero video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.65; }
        .hero-text { position: relative; text-align: center; color: #fff; padding: 0 1rem; }
        .hero-text h1 { font-family: 'Cormorant Garamond', serif; font-size: clamp(1.8rem, 6vw, 3.2rem); margin: 0 0 0.5rem; letter-spacing: 4px; font-weight: 300; }
        .hero-text p { letter-spacing: 3px; font-size: clamp(0.55rem, 2vw, 0.8rem); margin: 0; font-weight: 300; }
 
        /* ── Search & Sort UI ── */
        .controls-bar { display: flex; justify-content: center; gap: 2rem; margin: 2rem 0; }
        .controls-bar input, .controls-bar select { border: none; border-bottom: 1px solid #1a1a1a; background: transparent; font-family: 'Montserrat', sans-serif; font-size: 0.65rem; letter-spacing: 2px; text-transform: uppercase; padding: 0.5rem; outline: none; color: #1a1a1a; cursor: pointer; }

        /* ── Updated Product grid ── */
        .catalog {
            max-width: 1400px; /* Wider for desktop */
            margin: 0 auto 5rem;
            padding: 0 1.5rem;
            display: grid;
            /* 3 items on desktop, 2 on mobile */
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); 
            gap: 3rem 2rem;
        }
 
        .product-card { text-decoration: none; color: inherit; display: block; }
        .product-card-image { width: 100%; aspect-ratio: 3 / 4; object-fit: cover; display: block; background: #f5f3f0; }
        .product-card-meta { display: flex; justify-content: space-between; align-items: flex-start; margin-top: 1rem; gap: 1rem; }
        .product-card-title { font-size: 0.9rem; font-weight: 300; letter-spacing: 0.5px; line-height: 1.4; }
        .product-card-price { font-size: 0.9rem; font-weight: 300; color: #707070; white-space: nowrap; }
 
        @media (max-width: 768px) {
            .main-content { margin-top: 95px; }
            .hero { height: 300px; }
            .catalog { 
                grid-template-columns: repeat(2, 1fr); /* Force 2 columns on mobile */
                gap: 1rem 0.5rem; 
                padding: 0 0.5rem; 
            }
            .product-card-title, .product-card-price { font-size: 0.75rem; }
        }
    </style>
</head>
<body>
 
    <div class="sticky-nav">
        <div id="dynamicBannerContainer"></div>
        <div id="dynamicNavContainer"></div>
    </div>
 
    <div class="main-content">
        <section class="hero">
            <video autoplay muted loop playsinline src="images/banner.mp4"></video>
            <div class="hero-text">
                <h1>Free Soul, Second Skin</h1>
                <p>Slow collection crafted in delicate lace</p>
            </div>
        </section>

        <div class="controls-bar">
            <input type="text" id="productSearch" placeholder="SEARCH..." oninput="renderFilteredProducts()">
            <select id="sortSelect" onchange="renderFilteredProducts()">
                <option value="default">SORT BY</option>
                <option value="price-low">PRICE: LOW TO HIGH</option>
                <option value="price-high">PRICE: HIGH TO LOW</option>
            </select>
        </div>
        
        <main id="productsDisplay" class="catalog"></main>
    </div>
 
    <script src="products.js"></script>
    <script src="banner.js"></script>
    <script src="navbar.js"></script>
    <script>
        function renderFilteredProducts() {
            const display = document.getElementById('productsDisplay');
            const searchTerm = document.getElementById('productSearch').value.toLowerCase();
            const sortValue = document.getElementById('sortSelect').value;
            const currentLang = localStorage.getItem('selectedLang') || 'en';
            const activeCat = new URLSearchParams(window.location.search).get('cat') || '';

            if (typeof productsMaster === 'undefined') {
                display.innerHTML = '<p style="text-align:center;color:#999;grid-column:1/-1;">Product database unavailable.</p>';
                return;
            }

            let filtered = activeCat
                ? productsMaster.filter(p => Array.isArray(p.categories) && p.categories.includes(activeCat))
                : productsMaster;

            filtered = filtered.filter(p => p.title.toLowerCase().includes(searchTerm));

            if (sortValue === 'price-low') {
                filtered.sort((a, b) => parseFloat(a.price) - parseFloat(b.price));
            } else if (sortValue === 'price-high') {
                filtered.sort((a, b) => parseFloat(b.price) - parseFloat(a.price));
            }

            if (filtered.length === 0) {
                display.innerHTML = '<p style="text-align:center;color:#999;grid-column:1/-1;font-size:0.8rem;letter-spacing:1px;margin-top:2rem;">NO PRODUCTS MATCH YOUR SEARCH.</p>';
                return;
            }

            const langData = (p) => (p.translations && p.translations[currentLang]) || (p.translations && p.translations['en']) || {};

            display.innerHTML = filtered.map(p => {
                const t = langData(p);
                return `
                    <a href="product.html?id=${p.id}" class="product-card">
                        <img src="${p.image}" alt="${p.title}" class="product-card-image" loading="lazy">
                        <div class="product-card-meta">
                            <span class="product-card-title">${p.title}</span>
                            <span class="product-card-price">${p.price}</span>
                        </div>
                    </a>
                `;
            }).join('');
        }

        document.addEventListener("DOMContentLoaded", renderFilteredProducts);
    </script>
 
    <script src="footer.js"></script>
</body>
</html>
