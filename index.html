<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Libre Studio &mdash; Official E-Commerce</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; font-family: 'Montserrat', sans-serif; background: #fff; color: #1a1a1a; -webkit-font-smoothing: antialiased; }
        .sticky-nav-wrapper { position: fixed; top: 0; width: 100%; z-index: 1000; background: #fff; box-shadow: 0 1px 10px rgba(0,0,0,0.02); }
        .main-content-wrapper { margin-top: 75px; }
        .hero-banner-container { width: 100%; aspect-ratio: 38 / 10; position: relative; overflow: hidden; background: #000; }
        .hero-video-wrapper video { width: 100%; height: 100%; object-fit: cover; }
        .hero-video-overlay { position: absolute; top:0; left:0; width: 100%; height: 100%; background: rgba(0,0,0,0.45); }
        .catalog-container { max-width: 1200px; margin: 4rem auto; padding: 0 2rem; }
        .products-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2.5rem 2rem; }
        .product-card { text-decoration: none; color: #1a1a1a; transition: opacity 0.3s ease; }
        .product-card:hover { opacity: 0.85; }
        .product-image-wrapper { aspect-ratio: 3/4; background: #f7f5f2; overflow: hidden; }
        .product-image-wrapper img { width: 100%; height: 100%; object-fit: cover; }
        .product-info { margin-top: 1rem; display: flex; justify-content: space-between; font-size: 0.75rem; }
    </style>
</head>
<body>

    <div class="sticky-nav-wrapper"><div id="dynamicNavContainer"></div></div>

    <div class="main-content-wrapper">
        <section class="hero-banner-container">
            <div class="hero-video-wrapper"><video autoplay muted loop playsinline src="images/banner.mp4"></video></div>
            <div class="hero-video-overlay"></div>
        </section>

        <main class="catalog-container">
            <div id="productsDisplay" class="products-grid"></div>
        </main>
    </div>

    <script src="products.js"></script>
    <script src="navbar.js"></script>
    
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const urlParams = new URLSearchParams(window.location.search);
            const cat = urlParams.get('cat'); 

            let filtered = productsMaster;
            if (cat) {
                filtered = productsMaster.filter(p => p.category === cat);
            }

            const display = document.getElementById('productsDisplay');
            if (display) {
                display.innerHTML = filtered.map(prod => `
                    <a href="product.html?id=${prod.id}" class="product-card">
                        <div class="product-image-wrapper"><img src="${prod.image}" alt="${prod.title}"></div>
                        <div class="product-info">
                            <h3>${prod.title}</h3>
                            <span>${prod.price}</span>
                        </div>
                    </a>
                `).join('');
            }
        });
    </script>
</body>
</html>
