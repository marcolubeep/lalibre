<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>La Libre Studio &mdash; Official E-Commerce</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Montserrat:wght@200;300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #ffffff; color: #1a1a1a; font-family: 'Montserrat', sans-serif; font-weight: 300; line-height: 1.4; scroll-behavior: smooth; }
        h1, h2, h3, .logo-text, .nav-links a, .hero-title { font-family: 'Cormorant Garamond', serif; font-weight: 400; letter-spacing: 0.02em; }
        .sticky-nav-wrapper { position: fixed; top: 0; width: 100%; z-index: 1050; background: #ffffff; box-shadow: 0 1px 10px rgba(0,0,0,0.03); }
        .main-content-wrapper { margin-top: 96px; }
        .search-section { max-width: 1280px; margin: 0 auto 1.5rem auto; padding: 0 2rem; }
        .search-discreet { display: flex; align-items: baseline; justify-content: flex-end; gap: 2rem; flex-wrap: wrap; border-bottom: 1px solid #e8e4df; padding-bottom: 0.8rem; }
        .search-field input { border: none; background: transparent; padding: 0.4rem 0; font-family: 'Montserrat', sans-serif; font-size: 0.8rem; font-weight: 400; letter-spacing: 0.05em; width: 160px; border-bottom: 1px solid transparent; transition: width 0.2s ease; color: #2a2a2a; }
        .search-field input:focus { outline: none; width: 190px; border-bottom-color: #c8c0b5; }
        .sort-discreet select { border: none; background: transparent; font-family: 'Montserrat', sans-serif; font-size: 0.8rem; font-weight: 400; letter-spacing: 0.05em; padding: 0.4rem 0; cursor: pointer; color: #2a2a2a; border-bottom: 1px solid transparent; }
        .clear-link { background: none; border: none; font-family: 'Montserrat', sans-serif; font-size: 0.7rem; font-weight: 400; letter-spacing: 0.1em; text-transform: uppercase; color: #a0988c; cursor: pointer; transition: color 0.2s; }
        .catalog-container { max-width: 1280px; margin: 2rem auto 5rem auto; padding: 0 2rem; }
        .products-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2.8rem 1.8rem; }
        .product-card { text-decoration: none; color: #1a1a1a; transition: transform 0.25s ease, opacity 0.25s; display: block; cursor: pointer; }
        .product-image-wrapper { aspect-ratio: 3 / 4; background: #f5f3ef; overflow: hidden; border-radius: 2px; }
        .product-image-wrapper img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.1); }
        .product-info { margin-top: 1rem; display: flex; justify-content: space-between; align-items: baseline; font-size: 0.75rem; font-weight: 400; }
        .product-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(8px); z-index: 2000; display: flex; align-items: center; justify-content: center; opacity: 0; visibility: hidden; transition: opacity 0.3s ease, visibility 0.3s ease; }
        .product-modal.active { opacity: 1; visibility: visible; }
        .modal-container { background: #fff; max-width: 900px; width: 90%; max-height: 85vh; overflow-y: auto; border-radius: 4px; position: relative; }
    </style>
</head>
<body>

    <div id="dynamicBannerContainer"></div>
    <div class="sticky-nav-wrapper"><div id="dynamicNavContainer"></div></div>

    <div class="main-content-wrapper">
        <div id="heroContainer"></div>
        <div class="search-section">
            <div class="search-discreet">
                <div class="search-field"><input type="text" id="searchInput" placeholder="search"></div>
                <div class="sort-discreet">
                    <select id="sortSelect">
                        <option value="default">order</option>
                        <option value="price-asc">price ↑</option>
                        <option value="price-desc">price ↓</option>
                    </select>
                </div>
                <button class="clear-link" id="clearSearchBtn">clear</button>
            </div>
        </div>

        <div class="products-header"><div class="product-count" id="productCount"></div></div>
        <main class="catalog-container">
            <div id="productsDisplay" class="products-grid"></div>
        </main>
    </div>

    <div id="productModal" class="product-modal">
        <div class="modal-container">
            <button class="modal-close" id="closeModalBtn">&times;</button>
            <div id="modalContent"></div>
        </div>
    </div>

    <script src="products.js"></script>
    <script src="banner.js"></script>
    <script src="navbar.js"></script>
    <script src="hero.js"></script>
    <script src="footer.js"></script>
    
    <script>
        function extractPriceNum(priceStr) {
            if (!priceStr) return 0;
            const match = priceStr.match(/\d+([,.]\d+)?/);
            return match ? parseFloat(match[0].replace(',', '.')) : 0;
        }

        (function() {
            let isInitialized = false;
            function init() {
                if (isInitialized) return;
                // Controllo esteso per window.productsMaster
                if (!window.productsMaster || !window.productsMaster.length) {
                    setTimeout(init, 100);
                    return;
                }
                isInitialized = true;
                
                const modal = document.getElementById('productModal');
                const modalContent = document.getElementById('modalContent');
                
                function getFilteredAndSortedProducts() {
                    const urlParams = new URLSearchParams(window.location.search);
                    let cat = urlParams.get('cat');
                    const searchTerm = document.getElementById('searchInput')?.value.toLowerCase() || '';
                    const sortValue = document.getElementById('sortSelect')?.value || 'default';
                    
                    let filtered = [...window.productsMaster];
                    
                    // Logica di filtro migliorata
                    if (cat && cat !== 'null' && cat !== 'undefined' && cat !== '') {
                        filtered = filtered.filter(product => {
                            if (!product.categories) return false;
                            const normalizedCat = cat.toLowerCase();
                            return product.categories.some(c => c.toLowerCase() === normalizedCat);
                        });
                    }
                    
                    if (searchTerm) {
                        filtered = filtered.filter(p => p.title.toLowerCase().includes(searchTerm));
                    }
                    
                    if (sortValue === 'price-asc') filtered.sort((a, b) => extractPriceNum(a.price) - extractPriceNum(b.price));
                    else if (sortValue === 'price-desc') filtered.sort((a, b) => extractPriceNum(b.price) - extractPriceNum(a.price));
                    
                    return filtered;
                }
                
                function renderProducts() {
                    const display = document.getElementById('productsDisplay');
                    const filtered = getFilteredAndSortedProducts();
                    if (!display) return;
                    
                    display.innerHTML = filtered.length ? filtered.map(prod => `
                        <div class="product-card" data-product-id="${prod.id}">
                            <div class="product-image-wrapper"><img src="${prod.image}" loading="lazy"></div>
                            <div class="product-info"><h3>${prod.
