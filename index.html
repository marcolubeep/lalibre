<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>La Libre Studio &mdash; Official E-Commerce</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Montserrat:wght@200;300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #ffffff; color: #1a1a1a; font-family: 'Montserrat', sans-serif; }
        .sticky-nav-wrapper { position: fixed; top: 0; width: 100%; z-index: 1050; background: #ffffff; padding: 1rem 0; box-shadow: 0 1px 10px rgba(0,0,0,0.03); }
        .main-content-wrapper { margin-top: 120px; }
        .catalog-container { max-width: 1280px; margin: 2rem auto; padding: 0 2rem; }
        .products-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2rem; }
        .product-card { text-decoration: none; color: #1a1a1a; cursor: pointer; }
        .product-image-wrapper { aspect-ratio: 3 / 4; background: #f5f3ef; overflow: hidden; }
        .product-image-wrapper img { width: 100%; height: 100%; object-fit: cover; }
        .product-info { margin-top: 1rem; }
    </style>
</head>
<body>

    <div class="sticky-nav-wrapper"><div id="dynamicNavContainer"></div></div>

    <div class="main-content-wrapper">
        <main class="catalog-container">
            <div id="productsDisplay" class="products-grid"></div>
        </main>
    </div>

    <script src="banner.js"></script>
    <script src="nav.js"></script>
    <script src="hero.js"></script>
    <script src="products.js"></script>

    <script>
        (function () {
            function adjustSpacer() {
                const nav = document.querySelector('.sticky-nav-wrapper');
                const spacer = document.getElementById('navSpacer');
                if (nav && spacer) spacer.style.height = nav.offsetHeight + 'px';
            }

            function renderProducts() {
                const display = document.getElementById('productsDisplay');
                if (!display || !window.productsMaster) return;

                const urlParams = new URLSearchParams(window.location.search);
                const cat = urlParams.get('cat');

                let filtered = window.productsMaster;
                if (cat && cat !== '' && cat !== 'null') {
                    filtered = filtered.filter(p =>
                        p.categories && p.categories.some(c => c.toLowerCase() === cat.toLowerCase())
                    );
                }

                display.innerHTML = filtered.map(prod => `
                    <a href="product.html?id=${prod.id}" class="product-card">
                        <div class="product-image-wrapper">
                            <img src="${prod.image}" alt="${prod.title}">
                        </div>
                        <div class="product-info">
                            <h3>${prod.title}</h3>
                            <p>${prod.price}</p>
                        </div>
                    </a>
                `).join('');
            }

            function init() {
                adjustSpacer();
                renderProducts();

                // Ricalcola lo spacer al resize (il mobile drawer può cambiare altezza)
                window.addEventListener('resize', adjustSpacer);

                // Ricalcola dopo che il mobile drawer si apre/chiude
                document.addEventListener('click', () => setTimeout(adjustSpacer, 300));

                // Aggiorna prodotti se cambia la lingua (le categorie potrebbero cambiare label)
                window.addEventListener('languageChanged', renderProducts);
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }
        })();
    </script>
</body>
</html>
