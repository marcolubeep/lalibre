<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>La Libre Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; font-family: 'Montserrat', sans-serif; background: #fff; }
        .sticky-nav { position: fixed; top: 0; width: 100%; z-index: 1000; background: #fff; }
        .main-content { margin-top: 100px; }
        
        /* Banner originale */
        .hero { position: relative; height: 400px; display: flex; align-items: center; justify-content: center; background: #000; }
        .hero video { width: 100%; height: 100%; object-fit: cover; opacity: 0.7; }
        .hero-text { position: absolute; text-align: center; color: #fff; }
        .hero-text h1 { font-family: 'Cormorant Garamond', serif; font-size: 3rem; margin: 0; letter-spacing: 4px; }
        
        .catalog { max-width: 1200px; margin: 4rem auto; padding: 0 2rem; display: grid; grid-template-columns: repeat(3, 1fr); gap: 2rem; }
    </style>
</head>
<body>

    <div class="sticky-nav"><div id="dynamicNavContainer"></div></div>

    <div class="main-content">
        <section class="hero">
            <video autoplay muted loop playsinline src="images/banner.mp4"></video>
            <div class="hero-text">
                <h1>FREE SOUL, SECOND SKIN</h1>
                <p style="letter-spacing: 3px; font-size: 0.8rem;">SLOW COLLECTION CRAFTED IN DELICATE LACE</p>
            </div>
        </section>

        <main id="productsDisplay" class="catalog"></main>
    </div>

    <script src="products.js"></script>
    <script src="navbar.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const cat = new URLSearchParams(window.location.search).get('cat');
            const display = document.getElementById('productsDisplay');
            const filtered = cat ? productsMaster.filter(p => p.category === cat) : productsMaster;
            
            display.innerHTML = filtered.map(p => `
                <a href="product.html?id=${p.id}" style="text-decoration:none; color:inherit;">
                    <img src="${p.image}" style="width:100%; aspect-ratio:3/4; object-fit:cover;">
                    <div style="display:flex; justify-content:space-between; margin-top:1rem; font-size:0.8rem;">
                        <span>${p.title}</span><span>${p.price}</span>
                    </div>
                </a>
            `).join('');
        });
    </script>
</body>
</html>
