<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Libre Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; font-family: 'Montserrat', sans-serif; background: #fff; color: #1a1a1a; -webkit-font-smoothing: antialiased; }
        .sticky-nav { position: fixed; top: 0; width: 100%; z-index: 1000; background: #fff; }
        .main-content { margin-top: 110px; }
        
        /* Hero */
        .hero { position: relative; height: 420px; display: flex; align-items: center; justify-content: center; background: #111; overflow: hidden; }
        .hero video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.65; }
        .hero-text { position: relative; text-align: center; color: #fff; padding: 0 1rem; }
        .hero-text h1 { font-family: 'Cormorant Garamond', serif; font-size: 3.2rem; margin: 0 0 0.5rem; letter-spacing: 4px; font-weight: 300; }
        .hero-text p { letter-spacing: 3px; font-size: 0.8rem; margin: 0; font-weight: 300; }

        /* Controls Bar - Minimalist */
        .controls-bar { display: flex; justify-content: center; gap: 3rem; margin: 3rem auto 1rem; max-width: 600px; }
        .styled-control { border: none; border-bottom: 1px solid #1a1a1a; background: transparent; padding: 0.5rem 0; font-family: 'Montserrat', sans-serif; font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; color: #1a1a1a; outline: none; cursor: pointer; }

        /* Catalog - 3 per row */
        .catalog { max-width: 1200px; margin: 2rem auto 5rem; padding: 0 2rem; display: grid; grid-template-columns: repeat(3, 1fr); gap: 3rem 2rem; }
        .product-card { text-decoration: none; color: inherit; display: block; }
        .product-card-image { width: 100%; aspect-ratio: 3 / 4; object-fit: cover; display: block; background: #f5f3f0; transition: opacity 0.4s ease; }
        .product-card-meta { display: flex; justify-content: space-between; margin-top: 0.75rem; }
        .product-card-title, .product-card-price { font-size: 0.78rem; font-weight: 300; letter-spacing: 0.5px; }

        @media (max-width: 768px) { .catalog { grid-template-columns: repeat(2, 1fr); gap: 1.5rem 1rem; } }
    </style>
</head>
<body>

    <div class="sticky-nav">
        <div id="dynamicBannerContainer"></div>
        <div id="dynamicNavContainer"></div>
    </div>

    <div class="main-content">
        <section class="hero">
            <video autoplay muted loop playsinline src="images/banner.mp4"></video>
            <div class="hero-text">
                <h1>Free Soul, Second Skin</h1>
                <p>Slow collection crafted in delicate lace</p>
            </div>
        </section>

        <div class="controls-bar">
            <input type="text" id="productSearch" class="styled-control" placeholder="SEARCH...">
            <select id="sortSelect" class="styled-control">
                <option value="default">SORT BY</option>
                <option value="price-low">PRICE: LOW TO HIGH</option>
                <option value="price-high">PRICE: HIGH TO LOW</option>
            </select>
        </div>
        
        <main id="productsDisplay" class="catalog"></main>
    </div>

    <script src="products.js"></script>
    <script src="banner.js"></script>
    <script src="navbar.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const currentLang = localStorage.getItem('selectedLang') || 'en';
            
            // Traduzioni UI
            const uiTranslations = {
                en: { search: "SEARCH...", sort: "SORT BY", low: "PRICE: LOW TO HIGH", high: "PRICE: HIGH TO LOW" },
                es: { search: "BUSCAR...", sort: "ORDENAR POR", low: "PRECIO: MENOR A MAYOR", high: "PRECIO: MAYOR A MENOR" },
                zh: { search: "搜索...", sort: "排序", low: "价格：由低到高", high: "价格：由高到低" }
            };

            const t = uiTranslations[currentLang] || uiTranslations['en'];
            document.getElementById('productSearch').placeholder = t.search;
            document.querySelector('#sortSelect option[value="default"]').textContent = t.sort;
            document.querySelector('#sortSelect option[value="price-low"]').textContent = t.low;
            document.querySelector('#sortSelect option[value="price-high"]').textContent = t.high;

            // Logica visualizzazione
            const display = document.getElementById('productsDisplay');
            const searchInput = document.getElementById('productSearch');
            const sortSelect = document.getElementById('sortSelect');

            function render() {
                const term = searchInput.value.toLowerCase();
                const sort = sortSelect.value;
                const urlParams = new URLSearchParams(window.location.search);
                const activeCat = urlParams.get('cat');

                let filtered = activeCat 
                    ? productsMaster.filter(p => p.categories && p.categories.includes(activeCat))
                    : [...productsMaster];

                if (term) filtered = filtered.filter(p => p.title.toLowerCase().includes(term));
                
                if (sort === 'price-low') filtered.sort((a, b) => parseFloat(a.price.replace(/[^0-9.]/g,'')) - parseFloat(b.price.replace(/[^0-9.]/g,'')));
                if (sort === 'price-high') filtered.sort((a, b) => parseFloat(b.price.replace(/[^0-9.]/g,'')) - parseFloat(a.price.replace(/[^0-9.]/g,'')));

                display.innerHTML = filtered.map(p => `
                    <a href="product.html?id=${p.id}" class="product-card">
                        <img src="${p.image}" class="product-card-image" loading="lazy">
                        <div class="product-card-meta">
                            <span class="product-card-title">${p.title}</span>
                            <span class="product-card-price">${p.price}</span>
                        </div>
                    </a>
                `).join('');
            }

            searchInput.addEventListener('input', render);
            sortSelect.addEventListener('change', render);
            render();
        });
    </script>
</body>
</html>
