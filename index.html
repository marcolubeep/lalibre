<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Libre Studio &mdash; Official E-Commerce</title>
    
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #ffffff;
            color: #1a1a1a;
            -webkit-font-smoothing: antialiased;
        }

        /* Contenitori dinamici isolati */
        #dynamicBannerContainer {
            width: 100%;
            margin: 0;
            padding: 0;
            display: block;
        }

        #dynamicNavContainer {
            width: 100%;
            margin: 0;
            padding: 0;
            display: block;
        }

        /* 🎬 CONTENITORE BANNER VIDEO HERO (Ultra panoramico) */
        .hero-banner-container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
            box-sizing: border-box;
        }

        .hero-video-wrapper {
            width: 100%;
            position: relative;
            overflow: hidden;
            background-color: #ffffff;
            aspect-ratio: 32 / 10; 
            display: block;
        }

        .hero-video-wrapper video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* 🖋️ SEZIONE CLAIM & DESCRIZIONE EDITORIALE */
        .brand-intro-section {
            max-width: 600px;
            margin: 3.5rem auto 2.5rem auto;
            text-align: center;
            padding: 0 1rem;
        }

        .brand-claim {
            font-size: 1.1rem;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 1rem;
            color: #1a1a1a;
        }

        .brand-description {
            font-size: 0.8rem;
            font-weight: 300;
            line-height: 1.6;
            color: #707070;
            letter-spacing: 0.5px;
        }

        /* Contenitore principale del catalogo */
        .catalog-container {
            max-width: 1200px;
            margin: 0 auto 3rem auto;
            padding: 0 2rem;
            box-sizing: border-box;
        }

        /* Griglia dei prodotti */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2rem;
        }

        .product-card {
            display: flex;
            flex-direction: column;
            text-decoration: none;
            color: #1a1a1a;
            transition: opacity 0.3s ease;
        }

        .product-card:hover {
            opacity: 0.85;
        }

        .product-image-wrapper {
            width: 100%;
            aspect-ratio: 3 / 4; 
            overflow: hidden;
            background-color: #f7f5f2;
            position: relative;
        }

        .product-image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .product-info {
            margin-top: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            font-size: 0.8rem;
            letter-spacing: 0.5px;
        }

        .product-title {
            font-weight: 400;
            margin: 0;
            text-transform: uppercase;
            font-size: 0.8rem;
        }

        .product-price {
            font-weight: 300;
            color: #707070;
        }

        .product-tagline {
            font-size: 0.75rem;
            color: #8c8c8c;
            margin-top: 0.4rem;
            font-weight: 300;
            line-height: 1.4;
        }

        /* Responsive Mobile */
        @media (max-width: 900px) {
            .hero-banner-container, .catalog-container {
                padding: 0 1rem;
            }
            .products-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 1.5rem;
            }
        }

        @media (max-width: 600px) {
            .products-grid {
                grid-template-columns: 1fr;
                gap: 2rem;
            }
            .hero-video-wrapper {
                aspect-ratio: 18 / 10; 
            }
        }
    </style>
</head>
<body>

    <div id="dynamicBannerContainer"></div>
    <div id="dynamicNavContainer"></div>

    <section class="hero-banner-container" style="margin-top: 1rem;">
        <div class="hero-video-wrapper">
            <video playsinline autoplay muted loop id="heroVideo">
                <source src="images/banner.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </div>
    </section>

    <section class="brand-intro-section" id="brandIntro"></section>

    <main class="catalog-container">
        <div id="productsDisplay" class="products-grid"></div>
    </main>

    <script src="products.js?v=2.4"></script>
    <script src="banner.js?v=2.4"></script>
    <script src="navbar.js?v=2.4"></script>
    
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const currentLang = localStorage.getItem('selectedLang') || 'en';
            
            // Rendering del Testo del Brand
            const introTranslations = {
                en: {
                    claim: "Architectural Underwear",
                    desc: "A study on pure geometries, structural lace, and timeless essential silhouettes designed to shape the body through deliberate creative design."
                },
                es: {
                    claim: "Ropa Interior Arquitectónica",
                    desc: "Un estudio sobre geometrías puras, encajes estructurales y siluetas esenciales atemporales diseñadas para moldear el cuerpo a través di un diseño creativo deliberado."
                },
                zh: {
                    claim: "建筑感内衣系列",
                    desc: "一项关于纯粹几何学、结构感蕾丝与永恒极简轮廓的研究，旨在通过刻意的创意设计重塑身体线条。"
                }
            };

            const introText = introTranslations[currentLang] || introTranslations['en'];
            const introContainer = document.getElementById('brandIntro');
            if (introContainer) {
                introContainer.innerHTML = `
                    <h1 class="brand-claim">${introText.claim}</h1>
                    <p class="brand-description">${introText.desc}</p>
                `;
            }

            // Rendering della Griglia dei Prodotti
            const display = document.getElementById('productsDisplay');
            if (typeof productsMaster !== 'undefined' && display) {
                display.innerHTML = productsMaster.map(prod => {
                    const translation = prod.translations[currentLang] || prod.translations['en'];
                    return `
                        <a href="product.html?id=${prod.id}" class="product-card">
                            <div class="product-image-wrapper" style="background-color: ${prod.fallbackColor || '#f7f5f2'}">
                                <img src="${prod.image}" alt="${prod.title}" onerror="this.style.display='none';">
                            </div>
                            <div class="product-info">
                                <h3 class="product-title">${prod.title}</h3>
                                <span class="product-price">${prod.price}</span>
                            </div>
                            <p class="product-tagline">${translation.tagline}</p>
                        </a>
                    `;
                }).join('');
            }
        });
    </script>

    <script src="footer.js?v=2.4"></script>

</body>
</html>
