<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Libre | Slow Collection</title>
    <script src="navbar.js"></script>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #1a1a1a;
            --accent-color: #707070;
            --light-gray: #f9f9f9;
            --overlay-bg: rgba(0, 0, 0, 0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); line-height: 1.6; }

        .banner {
            width: 100%;
            height: 45vh;
            min-height: 300px;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #0d0d0d;
        }

        .banner-media-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .banner-media-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none;
        }

        .banner-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.35));
            z-index: 2;
        }

        .banner-text { 
            position: relative; 
            z-index: 10; 
            text-align: center; 
            color: white; 
            max-width: 900px; 
            padding: 1rem 2rem; 
        }

        .banner-text h1 { 
            font-family: serif; 
            font-size: clamp(1.8rem, 4.5vw, 3.2rem); 
            font-weight: 400; 
            letter-spacing: 0.3rem; 
            text-transform: uppercase; 
            margin-bottom: 0.3rem; 
            color: #ffffff;
            text-shadow: 0 2px 12px rgba(0,0,0,0.4);
        }

        .banner-text p { 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            font-size: clamp(0.75rem, 1.8vw, 0.9rem); 
            font-weight: 300; 
            letter-spacing: 4px; 
            color: #e5e5e5; 
            text-transform: uppercase; 
            font-style: italic; 
        }

        .divider { width: 50px; height: 1px; background: #ffffff60; margin: 1rem auto; }

        .search-filter-bar {
            max-width: 1200px;
            margin: 4rem auto 0 auto;
            padding: 0 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 2rem;
            flex-wrap: wrap;
        }

        .search-wrapper {
            display: flex;
            align-items: center;
            border-bottom: 1px solid #e5e5e5;
            padding-bottom: 6px;
            width: 210px;
            transition: border-color 0.4s ease;
        }
        
        .search-wrapper:focus-within { border-color: var(--text-color); }
        .search-wrapper input {
            border: none;
            outline: none;
            font-size: 0.8rem;
            width: 100%;
            padding-left: 8px;
            color: var(--text-color);
            letter-spacing: 1.5px;
            text-transform: uppercase;
            background: transparent;
        }
        .search-wrapper input::placeholder { color: #b0b0b0; font-weight: 300; }

        .sort-wrapper { display: flex; align-items: center; gap: 0.3rem; }
        .sort-wrapper label { font-size: 0.8rem; color: var(--accent-color); text-transform: uppercase; letter-spacing: 1.5px; font-weight: 300; }
        
        .sort-select {
            border: none;
            background: transparent;
            font-size: 0.8rem;
            outline: none;
            cursor: pointer;
            padding: 2px 20px 2px 4px;
            letter-spacing: 1.5px;
            color: var(--text-color);
            text-transform: uppercase;
            font-weight: 400;
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='10' viewBox='0 0 24 24' fill='none' stroke='%231a1a1a' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'></polyline></svg>");
            background-repeat: no-repeat;
            background-position: right center;
            transition: color 0.2s ease;
        }
        .sort-select:hover { color: var(--accent-color); }
        .sort-select option { background-color: #ffffff; color: var(--text-color); text-transform: uppercase; letter-spacing: 1px; }

        .products-container { max-width: 1200px; margin: 2rem auto 4rem auto; padding: 0 2rem; min-height: 400px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 3rem; }
        
        .product-card { display: flex; flex-direction: column; text-decoration: none; color: inherit; cursor: pointer; }
        .product-image-box { height: 420px; display: flex; align-items: center; justify-content: center; transition: opacity 0.3s ease; text-align: center; padding: 1rem; font-weight: 500; background-size: cover; background-position: center; }
        .product-card:hover .product-image-box { opacity: 0.85; }
        
        .product-info { margin-top: 1rem; display: flex; justify-content: space-between; align-items: flex-start; }
        .product-title { font-size: 1rem; font-weight: 400; letter-spacing: 0.05rem; }
        .product-tagline { font-size: 0.85rem; color: var(--accent-color); margin-top: 0.2rem; }
        .product-price { font-weight: 500; }

        @media (max-width: 900px) {
            .search-filter-bar { flex-direction: column; align-items: stretch; gap: 1.5rem; }
            .search-wrapper { width: 100%; }
            .sort-wrapper { justify-content: space-between; }
        }

        .popup-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: var(--overlay-bg); display: flex; justify-content: center; align-items: center; z-index: 1000; opacity: 0; visibility: hidden; transition: opacity 0.4s ease, visibility 0.4s ease; padding: 20px; }
        .popup-overlay.active { opacity: 1; visibility: visible; }
        .popup-modal { background: #ffffff; padding: 3rem 2.5rem; max-width: 450px; width: 100%; position: relative; text-align: center; }
        .popup-close { position: absolute; top: 15px; right: 15px; background: none; border: none; cursor: pointer; color: var(--accent-color); display: flex; align-items: center; justify-content: center; }
        .popup-modal h2 { font-family: serif; font-size: 1.8rem; font-weight: 300; letter-spacing: 0.1rem; margin-bottom: 0.5rem; text-transform: uppercase; }
        .popup-form input[type="email"] { width: 100%; padding: 0.8rem 1rem; border: 1px solid #ccc; margin-bottom: 1rem; text-align: center; outline: none; }
        .popup-form button { width: 100%; padding: 0.9rem; background-color: var(--text-color); color: #fff; border: none; text-transform: uppercase; letter-spacing: 0.15rem; font-size: 0.85rem; cursor: pointer; }

        footer { text-align: center; padding: 4rem 1rem; border-top: 1px solid #eee; margin-top: 4rem; font-size: 0.85rem; color: var(--accent-color); letter-spacing: 0.05rem; }
    </style>
</head>
<body>

    <section class="banner">
        <div class="banner-media-container">
            <video autoplay loop muted playsinline>
                <source src="images/banner-video.mp4" type="video/mp4">
            </video>
        </div>
        <div class="banner-overlay"></div>
        <div class="banner-text">
            <h1>Free Soul, Second Skin</h1>
            <div class="divider"></div>
            <p>Slow Collection crafted in delicate lace</p>
        </div>
    </section>

    <div class="search-filter-bar">
        <div class="search-wrapper">
            <input type="text" id="searchInput" placeholder="SEARCH COLLECTION...">
        </div>
        
        <div class="sort-wrapper">
            <label for="sortSelect">SORT BY — </label>
            <select id="sortSelect" class="sort-select">
                <option value="default">DEFAULT</option>
                <option value="name-asc">NAME (A-Z)</option>
                <option value="price-asc">PRICE (LOW - HIGH)</option>
                <option value="price-desc">PRICE (HIGH - LOW)</option>
            </select>
        </div>
    </div>

    <main class="products-container">
        <div class="grid" id="productGrid"></div>
    </main>

    <div class="popup-overlay" id="emailPopup">
        <div class="popup-modal">
            <button class="popup-close" id="closePopup">✕</button>
            <h2>La Libre</h2>
            <p>Join the slow movement. Subscribe to receive private collection updates.</p>
            <form class="popup-form" id="subscribeForm">
                <input type="email" placeholder="YOUR EMAIL" required>
                <button type="submit">Subscribe</button>
            </form>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 LA LIBRE. ALL RIGHTS RESERVED.</p>
    </footer>

    <script src="products.js"></script>

    <script>
        let currentCategory = "all";
        let searchQuery = "";
        let currentSort = "default";

        function parsePrice(priceString) {
            return parseFloat(priceString.replace(/[^0-9.]/g, '')) || 0;
        }

        function changeCategory(category) {
            currentCategory = category;
            displayCatalog();
        }

        function displayCatalog() {
            const grid = document.getElementById('productGrid');
            if (!grid) return;
            grid.innerHTML = "";

            if (typeof productsMaster === 'undefined') {
                grid.innerHTML = "<p style='grid-column: 1/-1; text-align:center; color:var(--accent-color); margin: 2rem 0;'>Loading collection database...</p>";
                return;
            }

            let filteredProducts = productsMaster.filter(product => {
                const isActive = product.status === "active";
                const matchesCategory = currentCategory === "all" || product.categories.includes(currentCategory);
                return isActive && matchesCategory;
            });

            if (searchQuery.trim() !== "") {
                const query = searchQuery.toLowerCase().trim();
                filteredProducts = filteredProducts.filter(product => 
                    product.title.toLowerCase().includes(query) || 
                    product.tagline.toLowerCase().includes(query)
                );
            }

            if (currentSort === "name-asc") {
                filteredProducts.sort((a, b) => a.title.localeCompare(b.title));
            } else if (currentSort === "price-asc") {
                filteredProducts.sort((a, b) => parsePrice(a.price) - parsePrice(b.price));
            } else if (currentSort === "price-desc") {
                filteredProducts.sort((a, b) => parsePrice(b.price) - parsePrice(a.price));
            }

            if (filteredProducts.length === 0) {
                grid.innerHTML = "<p style='grid-column: 1/-1; text-align:center; color:var(--accent-color); margin: 4rem 0; letter-spacing: 1px; font-size: 0.85rem; text-transform: uppercase;'>No items match your search criteria.</p>";
                return;
            }

            filteredProducts.forEach(product => {
                const bgStyle = product.image ? `background-image: url('${product.image}');` : '';
                const textColor = product.fallbackColor === "#111111" || product.fallbackColor === "#2c2a29" ? "color: #fff;" : "";
                const placeholderText = !product.image ? `[ ${product.title} ]` : "";

                const cardHTML = `
                    <a href="product.html?id=${product.id}" class="product-card">
                        <div class="product-image-box" style="${bgStyle} background-color: ${product.fallbackColor}; ${textColor}">
                            ${placeholderText}
                        </div>
                        <div class="product-info">
                            <div>
                                <h3 class="product-title">${product.title}</h3>
                                <p class="product-tagline">${product.tagline}</p>
                            </div>
                            <span class="product-price">${product.price}</span>
                        </div>
                    </a>
                `;
                grid.innerHTML += cardHTML;
            });
        }

        function updateCartBadge() {
            const currentCount = localStorage.getItem('cartItemCount') || 0;
            const badge = document.querySelector('.cart-badge');
            if(badge) badge.innerText = currentCount;
        }

        window.addEventListener('load', () => {
            updateCartBadge();
            displayCatalog();

            const searchInput = document.getElementById('searchInput');
            if (searchInput) {
                searchInput.addEventListener('input', (e) => {
                    searchQuery = e.target.value;
                    displayCatalog();
                });
            }

            const sortSelect = document.getElementById('sortSelect');
            if (sortSelect) {
                sortSelect.addEventListener('change', (e) => {
                    currentSort = e.target.value;
                    displayCatalog();
                });
            }

            const popup = document.getElementById('emailPopup');
            const closeBtn = document.getElementById('closePopup');

            if (popup && !localStorage.getItem('subscribed') && !localStorage.getItem('popupDismissed')) {
                setTimeout(() => popup.classList.add('active'), 6000);
            }

            if(closeBtn && popup) {
                closeBtn.addEventListener('click', () => {
                    popup.classList.remove('active');
                    localStorage.setItem('popupDismissed', 'true');
                });
            }
        });
    </script>
</body>
</html>
