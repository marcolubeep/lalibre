<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Libre Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Montserrat:wght@200;300;400&display=swap&font-display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            background: #fff;
            color: #1a1a1a;
            -webkit-font-smoothing: antialiased;
        }
 
        /* Sticky nav wraps both announcement bar and main navbar */
        .sticky-nav {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            background: #fff;
        }
 
        /* Push content below the fixed nav */
        .main-content {
            margin-top: 110px; /* adjusted in media query */
        }
 
        /* ── Hero ── */
        .hero {
            position: relative;
            height: 420px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #111;
            overflow: hidden;
        }
        .hero video {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            opacity: 0.65;
        }
        .hero-text {
            position: relative;
            text-align: center;
            color: #fff;
            padding: 0 1rem;
        }
        .hero-text h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(1.8rem, 6vw, 3.2rem); /* scales with screen */
            margin: 0 0 0.5rem;
            letter-spacing: 4px;
            font-weight: 300;
        }
        .hero-text p {
            letter-spacing: 3px;
            font-size: clamp(0.55rem, 2vw, 0.8rem);
            margin: 0;
            font-weight: 300;
        }
 
        /* ── Category filter pills ── */
        .filter-bar {
            display: flex;
            justify-content: center;
            gap: 1rem;
            padding: 2rem 1rem 0;
            flex-wrap: wrap;
        }
        .filter-pill {
            font-size: 0.65rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-decoration: none;
            color: #888;
            padding: 0.4rem 1rem;
            border: 1px solid #e0e0e0;
            transition: all 0.25s;
            font-weight: 300;
        }
        .filter-pill:hover,
        .filter-pill.active {
            color: #1a1a1a;
            border-color: #1a1a1a;
        }
 
        /* ── Product grid ── */
        .catalog {
            max-width: 1200px;
            margin: 2.5rem auto 5rem;
            padding: 0 1.5rem;
            display: grid;
            /* responsive: 1 col on mobile, 2 on tablet, 3 on desktop */
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 2.5rem 2rem;
        }
 
        .product-card {
            text-decoration: none;
            color: inherit;
            display: block;
        }
        .product-card-image {
            width: 100%;
            aspect-ratio: 3 / 4;
            object-fit: cover;
            display: block;
            background: #f5f3f0;
        }
        .product-card-meta {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-top: 0.75rem;
            gap: 0.5rem;
        }
        .product-card-title {
            font-size: 0.78rem;
            font-weight: 300;
            letter-spacing: 0.5px;
            line-height: 1.4;
        }
        .product-card-price {
            font-size: 0.78rem;
            font-weight: 300;
            color: #707070;
            white-space: nowrap;
        }
 
        @media (max-width: 768px) {
            .main-content { margin-top: 95px; }
            .hero { height: 300px; }
            .catalog { gap: 1.5rem 1rem; }
        }
 
        @media (max-width: 480px) {
            /* 2-column grid on small phones */
            .catalog {
                grid-template-columns: repeat(2, 1fr);
                gap: 1rem 0.75rem;
                padding: 0 1rem;
            }
            .product-card-title,
            .product-card-price { font-size: 0.7rem; }
        }
    </style>
</head>
<body>
 
    <div class="sticky-nav">
        <!-- Announcement banner slot -->
        <div id="dynamicBannerContainer"></div>
        <!-- Main navbar -->
        <div id="dynamicNavContainer"></div>
    </div>
 
    <div class="main-content">
        <section class="hero">
            <video autoplay muted loop playsinline src="images/banner.mp4"></video>
            <div class="hero-text">
                <h1>Free Soul, Second Skin</h1>
                <p>Slow collection crafted in delicate lace</p>
            </div>
        </section>
 
        <!-- Filter pills -->
        <nav class="filter-bar" id="filterBar"></nav>

        <div class="controls-bar" style="display: flex; justify-content: center; gap: 1rem; margin-top: 1.5rem; margin-bottom: 1rem;">
    <input type="text" id="productSearch" placeholder="Search products..." oninput="renderFilteredProducts()" style="padding: 0.5rem; font-size: 0.7rem; border: 1px solid #e0e0e0;">
    
    <select id="sortSelect" onchange="renderFilteredProducts()" style="padding: 0.5rem; font-size: 0.7rem; border: 1px solid #e0e0e0;">
        <option value="default">Sort by</option>
        <option value="price-low">Price: Low to High</option>
        <option value="price-high">Price: High to Low</option>
    </select>
</div>
        
        <main id="productsDisplay" class="catalog"></main>
    </div>
 
    <script src="products.js"></script>
    <script src="banner.js"></script>
    <script src="navbar.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const currentLang = localStorage.getItem('selectedLang') || 'en';
            const urlParams = new URLSearchParams(window.location.search);
            const activeCat = urlParams.get('cat') || '';
 
            // Build filter pills
            const categories = [
                { key: '', label: { en: 'All', es: 'Todo', zh: '全部' } },
                { key: 'new-arrivals', label: { en: 'New Arrivals', es: 'Novedades', zh: '新品' } },
                { key: 'dresses', label: { en: 'Dresses', es: 'Vestidos', zh: '连衣裙' } },
                { key: 'lingeries', label: { en: 'Lingerie', es: 'Lencería', zh: '内衣' } },
            ];
            const filterBar = document.getElementById('filterBar');
            filterBar.innerHTML = categories.map(c => {
                const label = c.label[currentLang] || c.label['en'];
                const url = c.key ? `index.html?cat=${c.key}` : 'index.html';
                const isActive = activeCat === c.key;
                return `<a href="${url}" class="filter-pill ${isActive ? 'active' : ''}">${label}</a>`;
            }).join('');
 
            // Filter products — p.categories is an array
            const display = document.getElementById('productsDisplay');
            if (typeof productsMaster === 'undefined') {
                display.innerHTML = '<p style="text-align:center;color:#999;grid-column:1/-1;">Product database unavailable.</p>';
                return;
            }
 
            const filtered = activeCat
                ? productsMaster.filter(p => Array.isArray(p.categories) && p.categories.includes(activeCat))
                : productsMaster;
 
            if (filtered.length === 0) {
                display.innerHTML = '<p style="text-align:center;color:#999;grid-column:1/-1;font-size:0.8rem;letter-spacing:1px;">No products found.</p>';
                return;
            }
 
            const langData = (p) => (p.translations && p.translations[currentLang]) || (p.translations && p.translations['en']) || {};
 
            display.innerHTML = filtered.map(p => {
                const t = langData(p);
                return `
                    <a href="product.html?id=${p.id}" class="product-card">
                        <img
                            src="${p.image}"
                            alt="${p.title}"
                            class="product-card-image"
                            style="background-color:${p.fallbackColor || '#f5f3f0'};"
                            onerror="this.style.display='none'"
                            loading="lazy"
                        >
                        <div class="product-card-meta">
                            <span class="product-card-title">${p.title}</span>
                            <span class="product-card-price">${p.price}</span>
                        </div>
                        ${t.tagline ? `<p style="font-size:0.65rem;color:#999;margin:0.3rem 0 0;font-weight:300;line-height:1.5;">${t.tagline}</p>` : ''}
                    </a>
                `;
            }).join('');
        });
    </script>
 
    <script src="footer.js"></script>
</body>
</html>
