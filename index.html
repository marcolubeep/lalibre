<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Libre Studio &mdash; Official E-Commerce</title>
    
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #ffffff;
            color: #1a1a1a;
            -webkit-font-smoothing: antialiased;
        }

        /* 🎬 CONTENITORE BANNER VIDEO HERO */
        .hero-banner-container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
            box-sizing: border-box;
        }

        .hero-video-wrapper {
            width: 100%;
            position: relative;
            overflow: hidden;
            background-color: #f7f5f2;
            /* MODIFICA: Rapporto panoramico ultra-wide per ridurre l'altezza su Desktop */
            aspect-ratio: 24 / 10; 
        }

        .hero-video-wrapper video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Contenitore principale del catalogo */
        .catalog-container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 2rem;
            box-sizing: border-box;
        }

        /* Griglia dei prodotti: 3 colonne su Desktop, collassa fluidamente su Mobile */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2rem;
            margin-top: 2rem;
        }

        .product-card {
            display: flex;
            flex-direction: column;
            text-decoration: none;
            color: #1a1a1a;
            transition: opacity 0.3s ease;
        }

        .product-card:hover {
            opacity: 0.85;
        }

        .product-image-wrapper {
            width: 100%;
            aspect-ratio: 3 / 4; /* Proporzione classica verticale da luxury retail */
            overflow: hidden;
            background-color: #f7f5f2;
            position: relative;
        }

        .product-image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .product-info {
            margin-top: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            font-size: 0.8rem;
            letter-spacing: 0.5px;
        }

        .product-title {
            font-weight: 400;
            margin: 0;
            text-transform: uppercase;
            font-size: 0.8rem;
        }

        .product-price {
            font-weight: 300;
            color: #707070;
        }

        .product-tagline {
            font-size: 0.75rem;
            color: #8c8c8c;
            margin-top: 0.4rem;
            font-weight: 300;
            line-height: 1.4;
        }

        /* Responsive Mobile: Ottimizzazione per schermi piccoli */
        @media (max-width: 900px) {
            .hero-banner-container {
                padding: 0 1rem;
            }
            .products-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 1.5rem;
            }
        }

        @media (max-width: 600px) {
            .catalog-container {
                padding: 0 1rem;
                margin: 1rem auto;
            }
            .products-grid {
                grid-template-columns: 1fr;
                gap: 2rem;
            }
            .hero-video-wrapper {
                /* Su mobile lo teniamo leggermente più alto (16:9) rispetto al desktop 
                   così l'inquadratura non diventa una linea troppo sottile sullo smartphone */
                aspect-ratio: 16 / 10; 
            }
        }
    </style>
</head>
<body>

    <div id="dynamicBannerContainer"></div>

    <section class="hero-banner-container">
        <div class="hero-video-wrapper">
            <video playsinline autoplay muted loop preload="auto">
                <source src="images/banner.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </div>
    </section>

    <main class="catalog-container">
        <div id="productsDisplay" class="products-grid">
            </div>
    </main>

    <script src="products.js?v=2.0"></script>
    <script src="navbar.js?v=2.0"></script>
    
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const currentLang = localStorage.getItem('selectedLang') || 'en';
            const display = document.getElementById('productsDisplay');
            
            if (typeof productsMaster !== 'undefined' && display) {
                display.innerHTML = productsMaster.map(prod => {
                    const translation = prod.translations[currentLang] || prod.translations['en'];
                    
                    return `
                        <a href="product.html?id=${prod.id}" class="product-card">
                            <div class="product-image-wrapper" style="background-color: ${prod.fallbackColor}">
                                <img src="${prod.image}" alt="${prod.title}" onerror="this.style.display='none';">
                            </div>
                            <div class="product-info">
                                <h3 class="product-title">${prod.title}</h3>
                                <span class="product-price">${prod.price}</span>
                            </div>
                            <p class="product-tagline">${translation.tagline}</p>
                        </a>
                    `;
                }).join('');
            }
        });
    </script>

    <script src="footer.js?v=2.0"></script>

</body>
</html>
