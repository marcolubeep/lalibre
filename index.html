<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Libre | Slow Collection</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #1a1a1a;
            --accent-color: #707070;
            --light-gray: #f9f9f9;
            --overlay-bg: rgba(0, 0, 0, 0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); line-height: 1.6; }
        
        header {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            padding: 1.5rem 4%;
            border-bottom: 1px solid #eee;
            position: sticky;
            top: 0;
            background: white;
            z-index: 100;
        }
        
        .nav-left { display: flex; gap: 1.5rem; }
        .nav-left a { text-decoration: none; color: var(--text-color); font-size: 0.9rem; font-weight: 400; transition: color 0.2s; }
        .nav-left a:hover { color: var(--accent-color); }
        
        .logo { 
            font-family: serif; 
            font-size: 1.6rem; 
            letter-spacing: 0.3rem; 
            text-transform: uppercase; 
            font-weight: 400; 
            cursor: pointer;
            text-align: center;
        }
        
        .nav-right { display: flex; justify-content: flex-end; align-items: center; gap: 1.2rem; }
        .social-icons { display: flex; gap: 1rem; color: var(--text-color); }
        .social-icons i, .social-icons svg { cursor: pointer; width: 18px; height: 18px; }
        
        .lang-select {
            font-size: 0.85rem;
            border: none;
            background: transparent;
            cursor: pointer;
            outline: none;
        }

        .cart-icon-wrapper { position: relative; display: flex; align-items: center; }
        .cart-badge {
            position: absolute; top: -8px; right: -8px;
            background: var(--text-color); color: white;
            font-size: 0.65rem; padding: 2px 5px; border-radius: 50%;
        }

        .banner {
            width: 100%;
            height: 45vh;
            min-height: 300px;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #0d0d0d;
        }

        .banner-media-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .banner-media-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none;
        }

        .banner-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.35));
            z-index: 2;
        }

        .banner-text { 
            position: relative; 
            z-index: 10; 
            text-align: center; 
            color: white; 
            max-width: 900px; 
            padding: 1rem 2rem; 
        }

        .banner-text h1 { 
            font-family: serif; 
            font-size: clamp(1.8rem, 4.5vw, 3.2rem); 
            font-weight: 400; 
            letter-spacing: 0.3rem; 
            text-transform: uppercase; 
            margin-bottom: 0.3rem; 
            color: #ffffff;
            text-shadow: 0 2px 12px rgba(0,0,0,0.4);
        }

        .banner-text p { 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            font-size: clamp(0.75rem, 1.8vw, 0.9rem); 
            font-weight: 300; 
            letter-spacing: 4px; 
            color: #e5e5e5; 
            text-transform: uppercase; 
            font-style: italic; 
        }

        .divider { width: 50px; height: 1px; background: #ffffff60; margin: 1rem auto; }

        /* NUOVA SEZIONE FILTRI E RICERCA */
        .search-filter-bar {
            max-width: 1200px;
            margin: 3rem auto 0 auto;
            padding: 0 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1.5rem;
            flex-wrap: wrap;
        }

        .search-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #ccc;
            padding-bottom: 4px;
            width: 240px;
            transition: border-color 0.3s;
        }
        .search-wrapper:focus-within { border-color: var(--text-color); }
        .search-wrapper input {
            border: none;
            outline: none;
            font-size: 0.9rem;
            width: 100%;
            padding-left: 5px;
            color: var(--text-color);
            letter-spacing: 0.5px;
        }
        .search-wrapper i, .search-wrapper svg { color: var(--accent-color); width: 16px; height: 16px; }

        .sort-wrapper { display: flex; align-items: center; gap: 0.5rem; }
        .sort-wrapper label { font-size: 0.85rem; color: var(--accent-color); text-transform: uppercase; letter-spacing: 1px; }
        .sort-select {
            border: none;
            border-bottom: 1px solid transparent;
            font-size: 0.85rem;
            outline: none;
            cursor: pointer;
            padding-bottom: 2px;
            letter-spacing: 0.5px;
            color: var(--text-color);
            font-weight: 500;
        }
        .sort-select:hover { border-color: #ccc; }

        .products-container { max-width: 1200px; margin: 2rem auto 4rem auto; padding: 0 2rem; min-height: 400px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 3rem; }
        
        .product-card { display: flex; flex-direction: column; text-decoration: none; color: inherit; cursor: pointer; }
        .product-image-box { height: 420px; display: flex; align-items: center; justify-content: center; transition: opacity 0.3s ease; text-align: center; padding: 1rem; font-weight: 500; background-size: cover; background-position: center; }
        .product-card:hover .product-image-box { opacity: 0.85; }
        
        .product-info { margin-top: 1rem; display: flex; justify-content: space-between; align-items: flex-start; }
        .product-title { font-size: 1rem; font-weight: 400; letter-spacing: 0.05rem; }
        .product-tagline { font-size: 0.85rem; color: var(--accent-color); margin-top: 0.2rem; }
        .product-price { font-weight: 500; }

        @media (max-width: 900px) {
            header { grid-template-columns: 1fr; gap: 1rem; text-align: center; }
            .nav-left, .nav-right { justify-content: center; }
            .logo { order: -1; }
            .search-filter-bar { flex-direction: column; align-items: stretch; gap: 1rem; }
            .search-wrapper { width: 100%; }
            .sort-wrapper { justify-content: space-between; }
        }

        .popup-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: var(--overlay-bg); display: flex; justify-content: center; align-items: center; z-index: 1000; opacity: 0; visibility: hidden; transition: opacity 0.4s ease, visibility 0.4s ease; padding: 20px; }
        .popup-overlay.active { opacity: 1; visibility: visible; }
        .popup-modal { background: #ffffff; padding: 3rem 2.5rem; max-width: 450px; width: 100%; position: relative; text-align: center; }
        .popup-close { position: absolute; top: 15px; right: 15px; background: none; border: none; cursor: pointer; color: var(--accent-color); display: flex; align-items: center; justify-content: center; }
        .popup-modal h2 { font-family: serif; font-size: 1.8rem; font-weight: 300; letter-spacing: 0.1rem; margin-bottom: 0.5rem; text-transform: uppercase; }
        .popup-form input[type="email"] { width: 100%; padding: 0.8rem 1rem; border: 1px solid #ccc; margin-bottom: 1rem; text-align: center; outline: none; }
        .popup-form button { width: 100%; padding: 0.9rem; background-color: var(--text-color); color: #fff; border: none; text-transform: uppercase; letter-spacing: 0.15rem; font-size: 0.85rem; cursor: pointer; }

        footer { text-align: center; padding: 4rem 1rem; border-top: 1px solid #eee; margin-top: 4rem; font-size: 0.85rem; color: var(--accent-color); letter-spacing: 0.05rem; }
    </style>
</head>
<body>

    <header>
        <div class="nav-left">
            <a href="#" onclick="changeCategory('all'); return false;">Home</a>
            <a href="#" onclick="changeCategory('dresses'); return false;">Dresses</a>
            <a href="#" onclick="changeCategory('lingeries'); return false;">Lingeries</a>
            <a href="#" onclick="changeCategory('new-arrivals'); return false;">New Arrivals</a>
        </div>
        
        <div class="logo" onclick="window.location.href='index.html'">La Libre</div>
        
        <div class="nav-right">
            <div class="social-icons">
                <a href="https://www.instagram.com/lalibreofficial/" target="_blank" rel="noopener noreferrer" style="color: inherit; display: inline-flex; align-items: center;">
                    <i data-lucide="instagram"></i>
                </a>
                <a href="#" style="color: inherit; display: inline-flex; align-items: center;"><i data-lucide="facebook"></i></a>
                <a href="#" style="color: inherit; display: inline-flex; align-items: center;"><i data-lucide="pinterest"></i></a>
            </div>
            <select class="lang-select">
                <option>EN (UK)</option>
                <option>FR</option>
            </select>
            <a href="cart.html" class="cart-icon-wrapper" style="text-decoration: none; color: inherit;">
                <i data-lucide="shopping-bag" style="width: 20px; height: 20px;"></i>
                <span class="cart-badge">0</span>
            </a>
        </div>
    </header>

    <section class="banner">
        <div class="banner-media-container">
            <video autoplay loop muted playsinline>
                <source src="images/banner-video.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </div>
        <div class="banner-overlay"></div>
        <div class="banner-text">
            <h1>Free Soul, Second Skin</h1>
            <div class="divider"></div>
            <p>Slow Collection crafted in delicate lace</p>
        </div>
    </section>

    <!-- NUOVA MINI BARRA DI RICERCA E ORDINAMENTO -->
    <div class="search-filter-bar">
        <div class="search-wrapper">
            <i data-lucide="search"></i>
            <input type="text" id="searchInput" placeholder="Search collection...">
        </div>
        
        <div class="sort-wrapper">
            <label for="sortSelect">Sort by</label>
            <select id="sortSelect" class="sort-select">
                <option value="default">Default</option>
                <option value="name-asc">Name (A-Z)</option>
                <option value="price-asc">Price (Low to High)</option>
                <option value="price-desc">Price (High to Low)</option>
            </select>
        </div>
    </div>

    <main class="products-container">
        <div class="grid" id="productGrid"></div>
    </main>

    <div class="popup-overlay" id="emailPopup">
        <div class="popup-modal">
            <button class="popup-close" id="closePopup"><i data-lucide="x" style="width: 18px; height: 18px;"></i></button>
            <h2>La Libre</h2>
            <p>Join the slow movement. Subscribe to receive private collection updates.</p>
            <form class="popup-form" id="subscribeForm">
                <input type="email" placeholder="YOUR EMAIL" required>
                <button type="submit">Subscribe</button>
            </form>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 LA LIBRE. ALL RIGHTS RESERVED.</p>
    </footer>

    <script src="products.js"></script>

    <script>
        // Stato globale dei filtri attivi
        let currentCategory = "all";
        let searchQuery = "";
        let currentSort = "default";

        // Funzione per pulire la stringa del prezzo e convertirla in numero (es. "£71.00" -> 71)
        function parsePrice(priceString) {
            return parseFloat(priceString.replace(/[^0-9.]/g, '')) || 0;
        }

        function changeCategory(category) {
            currentCategory = category;
            displayCatalog();
        }

        function displayCatalog() {
            const grid = document.getElementById('productGrid');
            if (!grid) return;
            
            grid.innerHTML = "";

            if (typeof productsMaster === 'undefined') {
                grid.innerHTML = "<p style='grid-column: 1/-1; text-align:center; color:red; margin: 2rem 0;'>Errore di caricamento: File 'products.js' non trovato.</p>";
                return;
            }

            // 1. Applica Filtro Categoria e Stato "active"
            let filteredProducts = productsMaster.filter(product => {
                const isActive = product.status === "active";
                const matchesCategory = currentCategory === "all" || product.categories.includes(currentCategory);
                return isActive && matchesCategory;
            });

            // 2. Applica Filtro di Ricerca (per nome o descrizione)
            if (searchQuery.trim() !== "") {
                const query = searchQuery.toLowerCase().trim();
                filteredProducts = filteredProducts.filter(product => 
                    product.title.toLowerCase().includes(query) || 
                    product.tagline.toLowerCase().includes(query)
                );
            }

            // 3. Applica Ordinamento
            if (currentSort === "name-asc") {
                filteredProducts.sort((a, b) => a.title.localeCompare(b.title));
            } else if (currentSort === "price-asc") {
                filteredProducts.sort((a, b) => parsePrice(a.price) - parsePrice(b.price));
            } else if (currentSort === "price-desc") {
                filteredProducts.sort((a, b) => parsePrice(b.price) - parsePrice(a.price));
            }

            // Render dei prodotti filtrati
            if (filteredProducts.length === 0) {
                grid.innerHTML = "<p style='grid-column: 1/-1; text-align:center; color:var(--accent-color); margin: 4rem 0; letter-spacing: 1px;'>No items match your search criteria.</p>";
                return;
            }

            filteredProducts.forEach(product => {
                const bgStyle = product.image ? `background-image: url('${product.image}');` : '';
                const textColor = product.fallbackColor === "#111111" || product.fallbackColor === "#2c2a29" ? "color: #fff;" : "";
                const placeholderText = !product.image ? `[ ${product.title} ]` : "";

                const cardHTML = `
                    <a href="product.html?id=${product.id}" class="product-card">
                        <div class="product-image-box" style="${bgStyle} background-color: ${product.fallbackColor}; ${textColor}">
                            ${placeholderText}
                        </div>
                        <div class="product-info">
                            <div>
                                <h3 class="product-title">${product.title}</h3>
                                <p class="product-tagline">${product.tagline}</p>
                            </div>
                            <span class="product-price">${product.price}</span>
                        </div>
                    </a>
                `;
                grid.innerHTML += cardHTML;
            });
        }

        function updateCartBadge() {
            const currentCount = localStorage.getItem('cartItemCount') || 0;
            const badge = document.querySelector('.cart-badge');
            if(badge) badge.innerText = currentCount;
        }

        window.addEventListener('DOMContentLoaded', () => {
            if (typeof lucide !== 'undefined') lucide.createIcons();

            updateCartBadge();
            displayCatalog();

            // Ascoltatore per la barra di ricerca (aggiorna in tempo reale mentre digiti)
            const searchInput = document.getElementById('searchInput');
            if (searchInput) {
                searchInput.addEventListener('input', (e) => {
                    searchQuery = e.target.value;
                    displayCatalog();
                });
            }

            // Ascoltatore per il menu a tendina dell'ordinamento
            const sortSelect = document.getElementById('sortSelect');
            if (sortSelect) {
                sortSelect.addEventListener('change', (e) => {
                    currentSort = e.target.value;
                    displayCatalog();
                });
            }

            // Gestione Popup Newsletter standard
            const popup = document.getElementById('emailPopup');
            const closeBtn = document.getElementById('closePopup');
            const subscribeForm = document.getElementById('subscribeForm');

            if (popup && !localStorage.getItem('subscribed') && !localStorage.getItem('popupDismissed')) {
                setTimeout(() => popup.classList.add('active'), 6000);
            }

            if(closeBtn && popup) {
                closeBtn.addEventListener('click', () => {
                    popup.classList.remove('active');
                    localStorage.setItem('popupDismissed', 'true');
                });
                popup.addEventListener('click', (e) => { 
                    if (e.target === popup) {
                        popup.classList.remove('active'); 
                        localStorage.setItem('popupDismissed', 'true');
                    }
                });
            }

            if(subscribeForm && popup) {
                subscribeForm.addEventListener('submit', (e) => {
                    e.preventDefault();
                    localStorage.setItem('subscribed', 'true');
                    popup.classList.remove('active');
                    alert('Thank you for joining our movement.');
                });
            }
        });
    </script>
</body>
</html>
