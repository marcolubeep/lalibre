<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Libre | Slow Collection</title>

    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #1a1a1a;
            --accent-color: #707070;
            --light-gray: #f9f9f9;
            --overlay-bg: rgba(0, 0, 0, 0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); line-height: 1.6; }
        
        header {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            padding: 1.5rem 4%;
            border-bottom: 1px solid #eee;
            position: sticky;
            top: 0;
            background: white;
            z-index: 100;
        }
        
        .nav-left { display: flex; gap: 1.5rem; }
        .nav-left a { text-decoration: none; color: var(--text-color); font-size: 0.9rem; font-weight: 400; }
        
        .logo { 
            font-family: serif; 
            font-size: 1.6rem; 
            letter-spacing: 0.3rem; 
            text-transform: uppercase; 
            font-weight: 400; 
            cursor: pointer;
            text-align: center;
        }
        
        .nav-right { display: flex; justify-content: flex-end; align-items: center; gap: 1.2rem; }
        .social-icons { display: flex; gap: 1rem; color: var(--text-color); }
        .social-icons i, .social-icons svg { cursor: pointer; width: 18px; height: 18px; }
        
        .lang-select {
            font-size: 0.85rem;
            border: none;
            background: transparent;
            cursor: pointer;
            outline: none;
        }

        /* Clickable Cart Badge Link Area Box Styling */
        .cart-icon-wrapper { position: relative; display: flex; align-items: center; }
        .cart-badge {
            position: absolute; top: -8px; right: -8px;
            background: var(--text-color); color: white;
            font-size: 0.65rem; padding: 2px 5px; border-radius: 50%;
        }

            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

            animation-duration: 18s;
